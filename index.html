      : '<div class="history-table-wrap"><table class="history-table"><thead><tr><th>Vial ID</th><th>Peptide</th><th>Opened</th><th>Finished</th></tr></thead><tbody>' +
        s.finishedVials.slice().reverse().map(function (v) {
          return '<tr><td class="mono">' + esc(v.id) + '</td><td>' + esc(v.peptideName) + '</td><td>' + esc(v.reconstitutedDate || "—") + '</td><td>' + esc(v.finishedDate || "—") + '</td></tr>';
        }).join("") + '</tbody></table></div>';

    return '' +
      '<section class="card">' +
      '<h2>Inventory</h2>' +
      '<p class="card-desc">What\'s in stock, what\'s open, and what\'s been done with it.</p>' +
      purchaseSection +
      reconstituteSection +
      logDoseSection +
      stackSection +
      '<h3 class="section-h">Unopened (in stock)</h3>' +
      (unopenedHTML || '<div class="notice">Nothing unopened right now.</div>') +
      '<h3 class="section-h">Reconstituted (opened)</h3>' +
      activeHTML +
      (stackHistoryHTML ? stackHistoryHTML : "") +
      '<h3 class="section-h">Finished</h3>' +
      finishedHTML +
      (s.finishedVials.length > 0 || s.activeVials.length > 0
        ? '<button class="primary-btn secondary-btn" id="print-report-btn" style="margin-top:14px">Print full inventory report</button>'
        : "") +
      '</section>';
  }

  function purchaseFormHTML(bare) {
    var fields = '' +
      '<div class="grid-2">' +
      field("Peptide name", null, '<input type="text" id="inv-peptideName" placeholder="e.g. BPC-157" />') +
      field("Supplier", "optional", '<input type="text" id="inv-supplier" placeholder="e.g. ABC Pharmacy" />') +
      '</div>' +
      '<div class="grid-2">' +
      field("Vials purchased", null, '<input type="number" min="1" id="inv-vialsPurchased" placeholder="e.g. 10" />') +
      field("Strength per vial (mg)", null, '<input type="number" min="0" step="any" id="inv-strengthMg" placeholder="e.g. 10" />') +
      '</div>' +
      '<div class="grid-2">' +
      field("Vial size (mL)", "physical container size, optional", '<input type="number" min="0" step="any" id="inv-vialSizeML" placeholder="e.g. 5" />') +
      field("Purchase date", null, '<input type="date" id="inv-purchaseDate" value="' + todayISO() + '" />') +
      '</div>' +
      field("Lot number", "optional", '<input type="text" id="inv-lotNumber" placeholder="optional" />') +
      '<button class="primary-btn" id="add-purchase-btn">Add purchase</button>';
    return bare ? fields : '<div class="subcard"><h3>Log a purchase</h3>' + fields + '</div>';
  }

  function reconstituteFormHTML(g) {
    return '' +
      '<div class="recon-form">' +
      '<div class="grid-2">' +
      field("Diluent added (mL)", null, '<input type="number" min="0" step="any" id="recon-diluentML" placeholder="e.g. 2" />') +
      field("Reconstituted date", null, '<input type="date" id="recon-date" value="' + todayISO() + '" />') +
      '</div>' +
      '<div class="grid-2">' +
      field("Discard after", "How long until it must be discarded, per instructions",
        '<select id="recon-expiry-duration">' +
        '<option value="7">1 week</option>' +
        '<option value="14">2 weeks</option>' +
        '<option value="21" selected>3 weeks</option>' +
        '<option value="28">4 weeks</option>' +
        '<option value="42">6 weeks</option>' +
        '<option value="56">8 weeks</option>' +
        '<option value="custom">Custom date\u2026</option>' +
        '</select>' +
        '<div class="field-hint" id="recon-expiry-preview" style="margin-top:4px"></div>' +
        '<input type="date" id="recon-expiry-custom" style="display:none;margin-top:6px" />') +
      field("Planned injections", "Circles printed on the label", '<input type="number" min="1" id="recon-plannedDoses" value="8" />') +
      '</div>' +
      '<div class="grid-2">' +
      field("Dose per injection", null,
        '<div class="input-row"><input type="number" min="0" step="any" id="recon-doseAmount" placeholder="e.g. 250" />' +
        '<select id="recon-doseUnit"><option value="mcg">mcg</option><option value="mg">mg</option><option value="units">units (syringe)</option></select></div>') +
      field("Frequency", "As instructed \u2014 e.g. \"2x/week\", \"daily\", \"EOD\"", '<input type="text" id="recon-frequency" placeholder="e.g. 2x per week" />') +
      '</div>' +
      '<button class="primary-btn" id="confirm-recon-btn" data-peptide="' + esc(g.peptideName) + '" data-purchase-id="' + esc(g.purchaseId || "") + '">Confirm reconstitution</button>' +
      '</div>';
  }

  function renderStackBuilderHTML(activeVials) {
    if (activeVials.length === 0) {
      return '<div class="notice">No active vials to stack yet. Reconstitute at least two vials above first.</div>';
    }
    var rows = activeVials.map(function (v) {
      var conc = vialConcentration(v);
      return '' +
        '<div class="stack-row">' +
        '<label class="stack-check-label"><input type="checkbox" class="stack-check" data-vial-id="' + v.id + '" /> ' +
        '<strong>' + esc(v.peptideName) + '</strong> <span class="field-hint mono">' + esc(v.id) + ' · ' + fmt(conc / 1000, 3) + ' mg/mL</span></label>' +
        '<div class="input-row">' +
        '<input type="number" min="0" step="any" class="stack-amount" data-vial-id="' + v.id + '" placeholder="dose" />' +
        '<select class="stack-unit" data-vial-id="' + v.id + '"><option value="mcg">mcg</option><option value="mg">mg</option><option value="units">units</option></select>' +
        '</div>' +
        '</div>';
    }).join("");

    return '' +
      '<div class="subcard">' +
      rows +
      '<div class="grid-2" style="margin-top:12px">' +
      field("Syringe", null,
        '<select id="stack-syringe">' + SYRINGES.map(function (sy) { return opt(sy.id, "u100", sy.label); }).join("") + '</select>') +
      field("Date &amp; time", null, '<input type="datetime-local" id="stack-datetime" />') +
      '</div>' +
      '<div class="grid-2">' +
      field("Injection site", "optional", '<input type="text" id="stack-site" placeholder="e.g. abdomen" />') +
      field("Notes", "optional", '<input type="text" id="stack-notes" placeholder="optional" />') +
      '</div>' +
      '<button class="primary-btn" id="log-stack-btn">Log stacked injection</button>' +
      '</div>';
  }

  function renderStackHistoryHTML() {
    if (state.stacks.length === 0) return "";
    var rows = state.stacks.map(function (st) {
      var compLines = st.components.map(function (c) {
        return '<div class="vial-card-row mono">' + esc(c.peptideName) + ' (' + esc(c.vialId) + '): ' + esc(c.doseAmount) + ' ' + esc(c.doseUnit) + ' \u2192 ' + fmt(c.volumeML, 3) + ' mL</div>';
      }).join("");
      return '' +
        '<div class="vial-card">' +
        '<div class="vial-card-head"><strong>Stacked injection</strong><span class="field-hint">' + esc(st.date) + (st.time ? " " + esc(st.time) : "") + '</span></div>' +
        compLines +
        '<div class="vial-card-row mono">Total: ' + fmt(st.totalVolumeML, 3) + ' mL (' + fmt(st.totalUnits, 1) + ' units)</div>' +
        (st.site ? '<div class="vial-card-row">Site: ' + esc(st.site) + '</div>' : "") +
        (st.notes ? '<div class="vial-card-row">' + esc(st.notes) + '</div>' : "") +
        (st.overCapacity ? '<div class="warn-text">This total exceeded the selected syringe\'s capacity \u2014 double check before drawing.</div>' : "") +
        '<div class="vial-card-actions"><button class="text-btn subtle delete-stack-btn" data-stack-id="' + st.id + '">Delete</button></div>' +
        '</div>';
    }).join("");
    return '<h3 class="section-h">Stack history</h3>' + rows;
  }

  // lightweight toggle+list for use inside a card that already shows its own vial header
  function doseListToggleHTML(vial) {
    var injections = vial.injections || [];
    var expanded = expandedVialDosesId === vial.id;
    var conc = vialConcentration(vial);
    var rows = injections.map(function (inj, idx) { return doseLineHTML(vial, inj, idx, conc); }).join("");
    var doseListHTML = '<ul class="dose-line-list">' + (rows || '<li class="field-hint">No doses logged yet</li>') + '</ul>';
    return '<button type="button" class="text-btn toggle-vial-doses-btn" data-vial-id="' + esc(vial.id) + '">' +
      (expanded ? "\u25be Hide doses" : "\u25b8 Show doses (" + injections.length + ")") + '</button>' +
      (expanded ? doseListHTML : "");
  }

  function activeVialCardHTML(v) {
    var conc = vialConcentration(v);
    var doseAmountNum = parseFloat(v.doseAmount) || 0;
    var conv = doseToVolume(doseAmountNum, v.doseUnit, conc);
    var doneCount = (v.injections || []).length;
    var expired = isVialExpired(v);
    return '' +
      '<div class="vial-card' + (expired ? ' vial-card-expired' : '') + '">' +
      '<div class="vial-card-head">' +
      '<div><span class="mono vial-id">' + esc(v.id) + '</span> <strong>' + esc(v.peptideName) + '</strong>' +
      (expired ? ' <span class="reorder-flag expired-flag">Expired</span>' : '') + '</div>' +
      '<span class="field-hint">' + fmt(v.strengthMg, 2) + ' mg' + (v.vialSizeML ? ' (' + esc(v.vialSizeML) + ' mL vial)' : '') + ' / ' + esc(v.diluentML) + ' mL diluent</span>' +
      '</div>' +
      '<div class="vial-card-row">Mixed: ' + esc(v.reconstitutedDate || "—") + ' · Expires: ' + esc(v.expiryDate || "—") + '</div>' +
      '<div class="vial-card-row mono">Concentration: ' + fmt(conc / 1000, 4) + ' mg/mL</div>' +
      (doseAmountNum > 0
        ? '<div class="vial-card-row mono">Dose: ' + esc(v.doseAmount) + ' ' + esc(v.doseUnit) + ' = ' + fmt(conv.volumeML, 3) + ' mL (' + fmt(conv.volumeML * 100, 1) + ' units)</div>'
        : "") +
      (v.frequency ? '<div class="vial-card-row">Frequency: ' + esc(v.frequency) + '</div>' : "") +
      doseListToggleHTML(v) +
      '<div class="field-hint">' + (v.labelPrinted ? "Label printed " + esc(v.labelPrintedDate) : "Label not printed yet") + '</div>' +
      (expired ? '<div class="warn-text">This vial is past its expiry/discard date. Complete it below to reconstitute a new one for ' + esc(v.peptideName) + '.</div>' : "") +
      '<div class="vial-card-actions">' +
      '<button class="text-btn log-injection-btn" data-vial-id="' + v.id + '">+ Log injection</button>' +
      '<button class="text-btn print-vial-btn" data-vial-id="' + v.id + '">' + (v.labelPrinted ? "Reprint label" : "Print label") + '</button>' +
      '<button class="text-btn subtle edit-vial-btn" data-vial-id="' + v.id + '">' + (editingVialId === v.id ? "Cancel edit" : "Edit") + '</button>' +
      '<button class="text-btn subtle complete-vial-btn" data-vial-id="' + v.id + '">Complete vial</button>' +
      '</div>' +
      (editingVialId === v.id ? vialEditFormHTML(v) : "") +
      '</div>';
  }

  function vialEditFormHTML(v) {
    return '' +
      '<div class="recon-form">' +
      '<p class="card-desc small">Update these if your pharmacist or prescriber changed your instructions \u2014 this only edits what you\'ve recorded, it doesn\'t suggest new values.</p>' +
      '<div class="grid-2">' +
      field("Diluent (mL)", null, '<input type="number" min="0" step="any" id="edit-diluentML" value="' + esc(v.diluentML) + '" />') +
      field("Expiry / discard date", null, '<input type="date" id="edit-expiry" value="' + esc(v.expiryDate) + '" />') +
      '</div>' +
      '<div class="grid-2">' +
      field("Planned injections", null, '<input type="number" min="1" id="edit-plannedDoses" value="' + esc(v.plannedDoses) + '" />') +
      field("Dose per injection", null,
        '<div class="input-row"><input type="number" min="0" step="any" id="edit-doseAmount" value="' + esc(v.doseAmount) + '" />' +
        '<select id="edit-doseUnit">' + opt("mcg", v.doseUnit) + opt("mg", v.doseUnit) + opt("units", v.doseUnit, "units (syringe)") + '</select></div>') +
      '</div>' +
      field("Frequency", "As instructed \u2014 e.g. \"2x/week\", \"daily\", \"EOD\"", '<input type="text" id="edit-frequency" value="' + esc(v.frequency || "") + '" placeholder="e.g. 2x per week" />') +
      '<button class="primary-btn" id="confirm-edit-vial-btn" data-vial-id="' + v.id + '">Save changes</button>' +
      '</div>';
  }

  // ---------- saved calculations tab ----------
  function renderSavedTab() {
    var items = state.saved.map(function (s) {
      return '' +
        '<div class="vial-card">' +
        '<div class="vial-card-head"><strong>' + esc(s.compoundName || "Unnamed") + '</strong><span class="field-hint">' + esc(s.date) + '</span></div>' +
        '<div class="vial-card-row">' + esc(s.vialTotalAmount) + ' ' + esc(s.vialTotalUnit) + ' in ' + esc(s.diluentVolume) + ' mL</div>' +
        '<div class="vial-card-row mono">Dose: ' + esc(s.doseAmount) + ' ' + esc(s.doseUnit) + ' \u2192 ' + fmt(s.drawVolumeML, 3) + ' mL (' + fmt(s.drawUnits, 1) + ' units)</div>' +
        '<div class="vial-card-actions">' +
        '<button class="text-btn load-saved-btn" data-saved-id="' + s.id + '">Load into calculator</button>' +
        '<button class="text-btn subtle delete-saved-btn" data-saved-id="' + s.id + '">Delete</button>' +
        '</div>' +
        '</div>';
    }).join("");

    return '' +
      '<section class="card">' +
      '<h2>Saved calculations</h2>' +
      '<p class="card-desc">A quick library of past vial/dose calculations you\'ve saved, separate from the vial inventory \u2014 handy for comparing scenarios or re-checking a calc later.</p>' +
      (state.saved.length === 0
        ? '<div class="notice">Nothing saved yet. Go to the Dose tab, run a calculation, and tap "Save this calculation."</div>'
        : items) +
      '</section>';
  }

  // ---------- about tab ----------
  function renderAboutTab() {
    return '' +
      '<section class="card">' +
      '<h2>About RXpep Calculator</h2>' +
      '<p class="card-desc">RXpep Calculator is a medication math and vial-tracking tool. It helps you understand clinician-prescribed peptide concentrations, reconstitution volumes, and injection scheduling \u2014 it does not recommend, calculate, or adjust doses for you.</p>' +
      '<h3 class="section-h">What it does</h3>' +
      '<p class="card-desc">Converts vial strength and diluent volume into concentration; converts a prescribed dose into a draw volume and syringe units; tracks vials from purchase through reconstitution to completion; prints reference labels and an inventory report.</p>' +
      '<h3 class="section-h">What it does not do</h3>' +
      '<p class="card-desc">It does not verify medication authenticity, does not replace a pharmacist\'s label, and does not suggest a dose, schedule, or "beginner" regimen. Always follow your prescriber\'s or pharmacist\'s written instructions, and contact them with any questions or side effects.</p>' +
      '<h3 class="section-h">Your data</h3>' +
      '<p class="card-desc">Everything you enter is stored only in this browser\'s local storage on this device. Nothing is sent to a server.</p>' +
      '</section>';
  }

  function renderReferenceTab() {
    return '' +
      '<section class="card">' +
      '<h2>Reference</h2>' +
      '<p class="card-desc">A place to keep links you find useful \u2014 pharmacist/prescriber contact info, storage guidance, official product inserts, whatever\'s relevant to you. This is just a placeholder for now; tell me what you\'d like here and I\'ll fill it in.</p>' +
      '<ul class="reference-list">' +
      '<li class="field-hint">No links added yet</li>' +
      '</ul>' +
      '</section>';
  }

  function field(label, hint, innerHTML) {
    return '<label class="field"><span class="field-label">' + esc(label) + '</span>' + innerHTML +
      (hint ? '<span class="field-hint">' + esc(hint) + '</span>' : "") + '</label>';
  }
  function opt(value, selectedValue, text) {
    return '<option value="' + esc(value) + '"' + (String(value) === String(selectedValue) ? " selected" : "") + '>' + esc(text || value) + '</option>';
  }

  function tabButton(id, label) {
    return '<button role="tab" aria-selected="' + (currentTab === id) + '" class="tab ' + (currentTab === id ? "active" : "") + '" data-tab="' + id + '">' + esc(label) + '</button>';
  }

  function renderContent() {
    var d = derive();
    var content = document.getElementById("content");
    if (currentTab === "start") content.innerHTML = renderStartTab(d);
    else if (currentTab === "vial") content.innerHTML = renderVialTab(d);
    else if (currentTab === "dose") content.innerHTML = renderDoseTab(d);
    else if (currentTab === "log") content.innerHTML = renderLogTab(d);
    else if (currentTab === "label") content.innerHTML = renderLabelTab(d);
    else if (currentTab === "inventory") content.innerHTML = renderInventoryTab();
    else if (currentTab === "saved") content.innerHTML = renderSavedTab();
    else if (currentTab === "about") content.innerHTML = renderAboutTab();
    else if (currentTab === "reference") content.innerHTML = renderReferenceTab();
    attachContentHandlers();
  }

  // ---------- lightweight output-only refresh (keeps focus in inputs) ----------
  function updateOutputs() {
    var d = derive();
    var vp = document.getElementById("vial-result-panel");
    if (vp) { vp.className = "result-panel " + (d.hasVial ? "" : "muted"); vp.innerHTML = renderConcentrationResult(d); }

    var dp = document.getElementById("dose-result-panel");
    if (dp) { dp.className = "result-panel " + (d.hasVial && d.hasDose ? "" : "muted"); dp.innerHTML = renderDoseResult(d); }

    var logBtn = document.getElementById("log-btn");
    if (logBtn) logBtn.disabled = !d.hasDose;

    var strip = document.getElementById("summary-strip");
    if (strip) strip.innerHTML = renderSummaryStrip(d);

    var preview = document.getElementById("label-preview");
    if (preview) {
      if (labelSelection === "adhoc") {
        preview.innerHTML = labelCardHTML(d);
      } else if (labelSelection.indexOf("vial:") === 0) {
        var previewVial = state.inventory.vials.filter(function (v) { return v.id === labelSelection.slice(5); })[0];
        if (previewVial) preview.innerHTML = vialLabelCardHTML(previewVial);
      } else if (labelSelection.indexOf("batch:") === 0) {
        var previewPurchase = state.inventory.purchases.filter(function (p) { return p.id === labelSelection.slice(6); })[0];
        if (previewPurchase) preview.innerHTML = batchLabelCardHTML(previewPurchase);
      }
    }

    var printBtn = document.getElementById("print-btn");
    if (printBtn && labelSelection === "adhoc") printBtn.disabled = !d.hasVial;

    var vialMatchBox = document.getElementById("vial-inventory-match");
    if (vialMatchBox) vialMatchBox.innerHTML = inventoryMatchHTML(state.vial.compoundName);

    var wizardDoseVial = state.inventory.vials.filter(function (v) { return v.id === dosingVialId; })[0];
    if (wizardDoseVial) {
      var wConc = vialConcentration(wizardDoseVial);
      var wAmount = parseFloat(state.dose.amount) || 0;
      var wConv = doseToVolume(wAmount, state.dose.unit, wConc);
      var wHasAmount = wAmount > 0;
      var wizardDoseResultPanel = document.getElementById("wizard-dose-result-panel");
      if (wizardDoseResultPanel) { wizardDoseResultPanel.className = "result-panel " + (wHasAmount ? "" : "muted"); wizardDoseResultPanel.innerHTML = renderWizardDoseResult(wConv, wHasAmount); }
      var wizardAddDoseConfirmBtn = document.getElementById("wizard-add-dose-confirm-btn");
      if (wizardAddDoseConfirmBtn) wizardAddDoseConfirmBtn.disabled = !wHasAmount;
    }

    var invDoseVial = state.inventory.vials.filter(function (v) { return v.id === state.dose.linkedVialId && v.status === "active"; })[0];
    var invDoseResultPanel = document.getElementById("inv-dose-result-panel");
    if (invDoseResultPanel) {
      var iConc = invDoseVial ? vialConcentration(invDoseVial) : 0;
      var iAmount = parseFloat(state.dose.amount) || 0;
      var iConv = doseToVolume(iAmount, state.dose.unit, iConc);
      var iHasAmount = iAmount > 0 && !!invDoseVial;
      invDoseResultPanel.className = "result-panel " + (iHasAmount ? "" : "muted");
      invDoseResultPanel.innerHTML = iHasAmount ? renderWizardDoseResult(iConv, true) : '<div class="result-label">Draw to</div><div class="result-value">\u2014</div>';
      var confirmInvDoseBtnLive = document.getElementById("confirm-inv-dose-btn");
      if (confirmInvDoseBtnLive) confirmInvDoseBtnLive.disabled = !iHasAmount;
    }
  }

  // ---------- event wiring ----------
  function attachGlobalHandlers() {
    var tabs = document.querySelectorAll(".tab");
    tabs.forEach(function (btn) {
      btn.addEventListener("click", function () {
        currentTab = btn.getAttribute("data-tab");
        if (currentTab === "start") {
          wizardStep = 1;
          wizardFlow = null;
        }
        var allTabs = document.querySelectorAll(".tab");
        allTabs.forEach(function (b) {
          var active = b === btn;
          b.classList.toggle("active", active);
          b.setAttribute("aria-selected", String(active));
        });
        renderContent();
      });
    });

    // delegated (bound once) so it keeps working even though the match box re-renders on every keystroke
    var contentEl = document.getElementById("content");
    contentEl.addEventListener("click", function (e) {
      var btn = e.target.closest ? e.target.closest("#use-inventory-match-btn") : null;
      if (!btn) return;
      var m = findInventoryMatch(state.vial.compoundName);
      if (!m) return;
      state.vial.totalAmount = String(m.strengthMg);
      state.vial.totalUnit = "mg";
      saveStateDebounced();
      renderContent();
    });
  }

  function attachContentHandlers() {
    var content = document.getElementById("content");

    // generic data-path inputs
    var pathEls = content.querySelectorAll("[data-path]");
    pathEls.forEach(function (el) {
      var evt = (el.tagName === "SELECT" || el.type === "date") ? "change" : "input";
      el.addEventListener(evt, function () {
        var val = el.value;
        if (el.getAttribute("data-numeric")) val = parseInt(val, 10);
        setPath(state, el.getAttribute("data-path"), val);
        saveStateDebounced();
        updateOutputs();
      });
    });

    // log entry fields (source-aware: routes to state.log or the owning vial's injections)
    var logFieldEls = content.querySelectorAll("[data-log-field]");
    logFieldEls.forEach(function (el) {
      var evt = el.type === "date" ? "change" : "input";
      el.addEventListener(evt, function () {
        var item = el.closest("[data-source]");
        if (!item) return;
        var source = item.getAttribute("data-source");
        var refId = item.getAttribute("data-ref-id");
        var field = el.getAttribute("data-log-field");
        var entry;
        if (source === "vial") {
          var vialRefId = item.getAttribute("data-vial-ref-id");
          var vial = state.inventory.vials.filter(function (v) { return v.id === vialRefId; })[0];
          entry = vial ? (vial.injections || []).filter(function (i) { return i.id === refId; })[0] : null;
        } else {
          entry = state.log.filter(function (e) { return e.id === refId; })[0];
        }
        if (entry) entry[field] = el.value;
        saveStateDebounced();
      });
    });

    // tracker row expand/collapse (compact by default, edit fields on demand)
    var editLogEntryBtns = content.querySelectorAll(".edit-log-entry-btn");
    editLogEntryBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        editingLogEntryKey = btn.getAttribute("data-entry-key");
        renderContent();
      });
    });
    var doneEditingLogBtns = content.querySelectorAll(".done-editing-log-btn");
    doneEditingLogBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        editingLogEntryKey = null;
        renderContent();
      });
    });

    // quick-add: reveal a single field (location or note) inline, without opening full edit mode
    var quickAddBtns = content.querySelectorAll(".quick-add-btn");
    quickAddBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        quickAddTarget = { entryKey: btn.getAttribute("data-entry-key"), field: btn.getAttribute("data-field") };
        renderContent();
      });
    });

    function saveQuickAdd(entryKey, field, value) {
      var parts = entryKey.split(":");
      var source = parts[0], refId = parts.slice(1).join(":");
      var entry = null;
      if (source === "vial") {
        for (var i = 0; i < state.inventory.vials.length && !entry; i++) {
          entry = (state.inventory.vials[i].injections || []).filter(function (inj) { return inj.id === refId; })[0] || null;
        }
      } else {
        entry = state.log.filter(function (e) { return e.id === refId; })[0] || null;
      }
      if (entry) entry[field] = value;
      quickAddTarget = null;
      saveStateDebounced();
      renderContent();
    }

    var saveQuickAddBtns = content.querySelectorAll(".save-quickadd-btn");
    saveQuickAddBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var entryKey = btn.getAttribute("data-entry-key");
        var field = btn.getAttribute("data-field");
        var input = content.querySelector('.quick-add-input[data-entry-key="' + entryKey + '"][data-field="' + field + '"]');
        saveQuickAdd(entryKey, field, input ? input.value : "");
      });
    });
    var quickAddInputs = content.querySelectorAll(".quick-add-input");
    quickAddInputs.forEach(function (input) {
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          saveQuickAdd(input.getAttribute("data-entry-key"), input.getAttribute("data-field"), input.value);
        }
      });
    });

    // remove log entry (source-aware)
    var removeBtns = content.querySelectorAll(".remove-log-btn");
    removeBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var item = btn.closest("[data-source]");
        if (!item) return;
        var source = item.getAttribute("data-source");
        var refId = item.getAttribute("data-ref-id");
        if (source === "vial") {
          var vialRefId = item.getAttribute("data-vial-ref-id");
          var vial = state.inventory.vials.filter(function (v) { return v.id === vialRefId; })[0];
          if (vial) vial.injections = (vial.injections || []).filter(function (i) { return i.id !== refId; });
        } else {
          state.log = state.log.filter(function (e) { return e.id !== refId; });
        }
        editingLogEntryKey = null;
        saveStateDebounced();
        renderContent();
      });
    });

    // view vial link (Tracker -> Inventory)
    var viewVialLinks = content.querySelectorAll(".view-vial-link");
    viewVialLinks.forEach(function (btn) {
      btn.addEventListener("click", function () {
        gotoInventoryTab();
      });
    });

    // log injection (from dose tab)
    var logBtn = document.getElementById("log-btn");
    if (logBtn) {
      logBtn.addEventListener("click", function () {
        var d = derive();
        if (!d.hasDose) return;
        logCurrentDose(d);
        currentTab = "log";
        var allTabs = document.querySelectorAll(".tab");
        allTabs.forEach(function (b) {
          var active = b.getAttribute("data-tab") === "log";
          b.classList.toggle("active", active);
          b.setAttribute("aria-selected", String(active));
        });
        renderContent();
      });
    }

    // reset flow
    var showResetBtn = document.getElementById("show-reset-btn");
    if (showResetBtn) {
      showResetBtn.addEventListener("click", function () {
        document.getElementById("danger-zone").innerHTML = renderDangerZone(true);
        attachContentHandlers();
      });
    }
    var confirmResetBtn = document.getElementById("confirm-reset-btn");
    if (confirmResetBtn) {
      confirmResetBtn.addEventListener("click", function () {
        state = JSON.parse(JSON.stringify(DEFAULT_STATE));
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
        renderContent();
      });
    }
    var cancelResetBtn = document.getElementById("cancel-reset-btn");
    if (cancelResetBtn) {
      cancelResetBtn.addEventListener("click", function () {
        document.getElementById("danger-zone").innerHTML = renderDangerZone(false);
        attachContentHandlers();
      });
    }

    // ---- inventory: stack an injection across multiple active vials ----
    var logStackBtn = document.getElementById("log-stack-btn");
    if (logStackBtn) {
      logStackBtn.addEventListener("click", function () {
        var checks = content.querySelectorAll(".stack-check");
        var components = [];
        var totalVolumeML = 0;
        var invalid = false;

        checks.forEach(function (cb) {
          if (!cb.checked) return;
          var vialId = cb.getAttribute("data-vial-id");
          var vial = state.inventory.vials.filter(function (v) { return v.id === vialId; })[0];
          if (!vial) return;
          var amountEl = content.querySelector('.stack-amount[data-vial-id="' + vialId + '"]');
          var unitEl = content.querySelector('.stack-unit[data-vial-id="' + vialId + '"]');
          var amount = parseFloat(amountEl ? amountEl.value : "") || 0;
          var unit = unitEl ? unitEl.value : "mcg";
          if (amount <= 0) { invalid = true; return; }
          var conc = vialConcentration(vial);
          var conv = doseToVolume(amount, unit, conc);
          components.push({ vialId: vialId, peptideName: vial.peptideName, doseAmount: amount, doseUnit: unit, volumeML: conv.volumeML });
          totalVolumeML += conv.volumeML;
        });

        if (components.length === 0) {
          alert(invalid ? "Enter a dose amount for each vial you checked." : "Check at least one active vial to include in the stack.");
          return;
        }

        var syringeSel = document.getElementById("stack-syringe");
        var syringe = SYRINGES.filter(function (sy) { return sy.id === (syringeSel ? syringeSel.value : "u100"); })[0] || SYRINGES[2];
        var overCapacity = totalVolumeML > syringe.capML;

        var dtVal = (document.getElementById("stack-datetime") || {}).value;
        var date, time;
        if (dtVal) {
          var parts = dtVal.split("T");
          date = parts[0];
          time = parts[1] || "";
        } else {
          date = todayISO();
          time = "";
        }

        var stackId = uid();
        state.stacks.unshift({
          id: stackId,
          date: date,
          time: time,
          site: (document.getElementById("stack-site") || {}).value || "",
          notes: (document.getElementById("stack-notes") || {}).value || "",
          components: components,
          totalVolumeML: totalVolumeML,
          totalUnits: totalVolumeML * 100,
          syringeId: syringe.id,
          overCapacity: overCapacity
        });

        components.forEach(function (c) {
          var vial = state.inventory.vials.filter(function (v) { return v.id === c.vialId; })[0];
          if (!vial) return;
          vial.injections = vial.injections || [];
          vial.injections.push({ id: uid(), date: date, stackId: stackId, doseAmount: c.doseAmount, doseUnit: c.doseUnit, site: "", note: "" });
        });

        saveStateDebounced();
        stackSectionOpen = false;
        renderContent();
      });
    }

    var deleteStackBtns = content.querySelectorAll(".delete-stack-btn");
    deleteStackBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-stack-id");
        state.stacks = state.stacks.filter(function (x) { return x.id !== id; });
        saveStateDebounced();
        renderContent();
      });
    });

    // ---- saved calculations ----
    var saveCalcBtn = document.getElementById("save-calc-btn");
    if (saveCalcBtn) {
      saveCalcBtn.addEventListener("click", function () {
        var d = derive();
        if (!d.hasVial || !d.hasDose) return;
        state.saved.unshift({
          id: uid(),
          date: todayISO(),
          compoundName: state.vial.compoundName,
          vialTotalAmount: state.vial.totalAmount,
          vialTotalUnit: state.vial.totalUnit,
          diluentVolume: state.vial.diluentVolume,
          doseAmount: state.dose.amount,
          doseUnit: state.dose.unit,
          drawVolumeML: d.drawVolumeML,
          drawUnits: d.drawUnits
        });
        saveStateDebounced();
        saveCalcBtn.textContent = "Saved!";
        setTimeout(function () { if (saveCalcBtn) saveCalcBtn.textContent = "Save this calculation"; }, 1200);
      });
    }
    var loadSavedBtns = content.querySelectorAll(".load-saved-btn");
    loadSavedBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-saved-id");
        var s = state.saved.filter(function (x) { return x.id === id; })[0];
        if (!s) return;
        state.vial.compoundName = s.compoundName;
        state.vial.totalAmount = s.vialTotalAmount;
        state.vial.totalUnit = s.vialTotalUnit;
        state.vial.diluentVolume = s.diluentVolume;
        state.dose.amount = s.doseAmount;
        state.dose.unit = s.doseUnit;
        saveStateDebounced();
        currentTab = "dose";
        var allTabs = document.querySelectorAll(".tab");
        allTabs.forEach(function (b) {
          var active = b.getAttribute("data-tab") === "dose";
          b.classList.toggle("active", active);
          b.setAttribute("aria-selected", String(active));
        });
        renderContent();
      });
    });
    var deleteSavedBtns = content.querySelectorAll(".delete-saved-btn");
    deleteSavedBtns.forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-saved-id");
        state.saved = state.saved.filter(function (x) { return x.id !== id; });
        saveStateDebounced();
        renderContent();
      });
    });
  }

  function vialLabelCardHTML(v) {
    var conc = vialConcentration(v);
    var doseAmountNum = parseFloat(v.doseAmount) || 0;
    var conv = doseToVolume(doseAmountNum, v.doseUnit, conc);
    var doneCount = (v.injections || []).length;
    var doseLine = doseAmountNum > 0
      ? '<div class="label-row mono">Dose: ' + esc(v.doseAmount) + ' ' + esc(v.doseUnit) + (v.frequency ? ' \u00b7 ' + esc(v.frequency) : '') + ' \u2192 ' + fmt(conv.volumeML * 100, 1) + 'U</div>'
      : "";
    return '' +
      '<div class="label-card">' +
      '<div class="label-name">RXpep · ' + esc(v.peptideName) + '</div>' +
      '<div class="label-row mono">' + esc(v.id) + '</div>' +
      '<div class="label-row">' + fmt(v.strengthMg, 2) + ' mg / ' + esc(v.diluentML) + ' mL</div>' +
      '<div class="label-row">Mixed ' + esc(v.reconstitutedDate || "—") + ' · Exp ' + esc(v.expiryDate || "—") + '</div>' +
      doseLine +
      '<div class="label-row">Usage ' + (doseAmountNum > 0 ? fmt(conv.volumeML * 100, 1) + "U " : "") + usageDotsHTML(v.plannedDoses, doneCount) + '</div>' +
      '<div class="label-footer">Per prescriber instructions — do not change dose without consulting them.</div>' +
      '</div>';
  }

  function printVialLabel(vial) {
    vial.labelPrinted = true;
    vial.labelPrintedDate = todayISO();
    saveStateDebounced();
    var size = LABEL_SIZES[state.label.size] || LABEL_SIZES.small;
    var copies = state.label.copies || 1;
    var cells = "";
    var tinyClass = state.label.size === "vial3ml" ? " label-tiny" : "";
    for (var i = 0; i < copies; i++) cells += '<div class="print-label-cell' + tinyClass + '">' + vialLabelCardHTML(vial) + '</div>';
    var root = document.getElementById("print-root");
    root.style.setProperty("--label-w", size.wIn + "in");
    root.style.setProperty("--label-h", size.hIn + "in");
    root.innerHTML = '<div class="print-sheet">' + cells + '</div>';
    window.print();
  }

  function batchLabelCardHTML(p) {
    return '' +
      '<div class="label-card">' +
      '<div class="label-name">RXpep \u00b7 ' + esc(p.peptideName) + '</div>' +
      '<div class="label-row mono">UNOPENED \u00b7 ' + fmt(p.strengthMgEach, 2) + ' mg' + (p.vialSizeML ? ' / ' + esc(p.vialSizeML) + ' mL vial' : '') + '</div>' +
      (p.supplier ? '<div class="label-row">' + esc(p.supplier) + '</div>' : '') +
      (p.lotNumber ? '<div class="label-row">Lot ' + esc(p.lotNumber) + '</div>' : '') +
      '<div class="label-row">Purchased ' + esc(p.date || "—") + '</div>' +
      '<div class="label-footer">Store per pharmacist instructions. Not yet reconstituted.</div>' +
      '</div>';
  }

  function printBatchLabel(purchase) {
    purchase.labelPrinted = true;
    purchase.labelPrintedDate = todayISO();
    saveStateDebounced();
    var size = LABEL_SIZES[state.label.size] || LABEL_SIZES.small;
    var copies = purchase.vialsPurchased || 1; // one label per physical vial in this batch, by default
    var cells = "";
    var tinyClass = state.label.size === "vial3ml" ? " label-tiny" : "";
    for (var i = 0; i < copies; i++) cells += '<div class="print-label-cell' + tinyClass + '">' + batchLabelCardHTML(purchase) + '</div>';
    var root = document.getElementById("print-root");
    root.style.setProperty("--label-w", size.wIn + "in");
    root.style.setProperty("--label-h", size.hIn + "in");
    root.innerHTML = '<div class="print-sheet">' + cells + '</div>';
    window.print();
  }

  function printInventoryReport() {
    var inv = state.inventory;
    var s = inventorySummary(inv);
    var root = document.getElementById("print-root");

    var purchasesRows = inv.purchases.map(function (p) {
      return '<tr><td>' + esc(p.date) + '</td><td>' + esc(p.peptideName) + '</td><td>' + esc(p.supplier || "—") + '</td>' +
        '<td>' + p.vialsPurchased + '</td><td>' + fmt(p.strengthMgEach, 2) + ' mg</td>' +
        '<td>' + (p.vialSizeML ? fmt(p.vialSizeML, 2) + ' mL' : "—") + '</td>' +
        '<td>' + fmt(p.totalMg, 2) + ' mg</td><td>' + esc(p.lotNumber || "—") + '</td></tr>';
    }).join("");

    var vialsRows = inv.vials.slice().reverse().map(function (v) {
      return '<tr><td>' + esc(v.id) + '</td><td>' + esc(v.peptideName) + '</td><td>' + esc(v.status) + '</td>' +
        '<td>' + esc(v.reconstitutedDate || "—") + '</td><td>' + esc(v.expiryDate || "—") + '</td>' +
        '<td>' + esc(v.finishedDate || "—") + '</td><td>' + ((v.injections || []).length) + ' / ' + (v.plannedDoses || "—") + '</td></tr>';
    }).join("");

    root.innerHTML = '' +
      '<div class="report-page">' +
      '<h1 class="report-title">RXpep Inventory Report</h1>' +
      '<p class="report-meta">Generated ' + todayISO() + '</p>' +
      '<div class="report-summary-grid">' +
      '<div><span>Total purchased</span><strong>' + fmt(s.totalPurchasedMg, 2) + ' mg</strong></div>' +
      '<div><span>Raw (unopened)</span><strong>' + fmt(s.rawMg, 2) + ' mg</strong></div>' +
      '<div><span>Reconstituted (active)</span><strong>' + fmt(s.reconstitutedMg, 2) + ' mg</strong></div>' +
      '<div><span>Remaining (est.)</span><strong>' + fmt(s.remainingMg, 2) + ' mg</strong></div>' +
      '<div><span>Unopened</span><strong>' + s.unopenedCount + '</strong></div>' +
      '<div><span>Active</span><strong>' + s.activeCount + '</strong></div>' +
      '<div><span>Finished</span><strong>' + s.finishedCount + '</strong></div>' +
      '</div>' +
      '<h2>Purchases</h2>' +
      '<table class="report-table"><thead><tr><th>Date</th><th>Peptide</th><th>Supplier</th><th>Vials</th><th>Strength</th><th>Vial size</th><th>Total</th><th>Lot</th></tr></thead><tbody>' +
      (purchasesRows || '<tr><td colspan="8">No purchases logged.</td></tr>') + '</tbody></table>' +
      '<h2>Vial history</h2>' +
      '<table class="report-table"><thead><tr><th>Vial ID</th><th>Peptide</th><th>Status</th><th>Opened</th><th>Expiry</th><th>Finished</th><th>Injections</th></tr></thead><tbody>' +
      (vialsRows || '<tr><td colspan="7">No vials yet.</td></tr>') + '</tbody></table>' +
      '<p class="report-footer">This is a personal record generated by RXpep Calculator. It is not a pharmacy document. Always follow your prescriber\'s or pharmacist\'s instructions.</p>' +
      '</div>';
    window.print();
  }

  function printLabel() {
    var d = derive();
    var size = LABEL_SIZES[state.label.size] || LABEL_SIZES.small;
    var copies = state.label.copies || 1;
    var cells = "";
    var tinyClass = state.label.size === "vial3ml" ? " label-tiny" : "";
    for (var i = 0; i < copies; i++) cells += '<div class="print-label-cell' + tinyClass + '">' + labelCardHTML(d) + '</div>';
    var root = document.getElementById("print-root");
    root.style.setProperty("--label-w", size.wIn + "in");
    root.style.setProperty("--label-h", size.hIn + "in");
    root.innerHTML = '<div class="print-sheet">' + cells + '</div>';
    window.print();
  }

  // ---------- boot ----------
  render();

  // Register service worker for offline support + installability.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("service-worker.js").catch(function (err) {
        console.warn("Service worker registration failed:", err);
      });
    });
  }
})();
</script>
</body>
</html>
