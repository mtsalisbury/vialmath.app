<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>VialMath — RxPep Calculator</title>

<!-- Installable app metadata -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#2C5F55" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />

<!-- iOS "Add to Home Screen" support -->
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="VialMath" />

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --paper: #EEF2EF;
    --card: #F8FAF9;
    --ink: #17262A;
    --primary: #2C5F55;
    --primary-light: #DCE8E3;
    --warn: #A85A2E;
    --warn-light: #F2E3D6;
    --line: #CBD6D1;
    --muted: #5C6F6A;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  .app-shell { max-width: 640px; margin: 0 auto; padding-bottom: 40px; min-height: 100vh; }

  .app-header { padding: 20px 20px 0; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .brand { display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
  .brand-logo { width: 220px; max-width: 70vw; height: auto; }
  .brand-mark { font-family: 'Fraunces', serif; font-size: 32px; color: var(--primary); line-height: 1; }
  h1 { font-family: 'Fraunces', serif; font-weight: 600; font-size: 24px; margin: 0; letter-spacing: -0.01em; }
  .brand-sub { margin: 0; font-size: 13px; color: var(--muted); }
  .save-indicator {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--primary);
    opacity: 0; transition: opacity 0.3s; padding-top: 4px;
  }
  .save-indicator.flash { opacity: 1; }

  .safety-banner {
    margin-top: 16px; background: var(--ink); color: var(--paper);
    padding: 12px 14px; border-radius: 6px; font-size: 12.5px; line-height: 1.5;
  }

  .tabs { display: flex; gap: 4px; padding: 16px 20px 0; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .tab {
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 14px;
    background: none; border: none; padding: 10px 14px; color: var(--muted);
    cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  @media (max-width: 480px) {
    .tab { padding: 8px 10px; font-size: 12.5px; }
    .app-header { padding: 16px 14px 0; }
    .content { padding: 14px; }
    .card { padding: 16px; }
  }

  .content { padding: 20px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 20px; }
  .card h2 { font-family: 'Fraunces', serif; font-size: 19px; margin: 0 0 6px; }
  .card-desc { color: var(--muted); font-size: 13.5px; line-height: 1.5; margin: 0 0 18px; }
  .card-desc.small { font-size: 12.5px; margin-top: 10px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  @media (max-width: 420px) { .grid-2 { grid-template-columns: 1fr; } }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field-label { font-size: 12.5px; font-weight: 600; color: var(--ink); }
  .field-hint { font-size: 11.5px; color: var(--muted); }

  input, select, textarea {
    font-family: 'Inter', sans-serif; font-size: 14px; padding: 9px 10px;
    border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
  .input-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .input-row input { flex: 1; min-width: 0; }
  .input-row select { width: auto; flex-shrink: 0; }
  .unit-suffix { display: flex; align-items: center; padding: 0 10px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }

  .result-panel { background: var(--primary-light); border-radius: 8px; padding: 16px; margin: 6px 0 16px; }
  .result-panel.muted { background: #F0F0EC; }
  .result-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .result-value { font-family: 'IBM Plex Mono', monospace; font-size: 22px; font-weight: 500; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .result-sub { font-size: 13px; color: var(--muted); font-weight: 400; }
  .syringe-wrap { margin-top: 14px; }
  .syringe-wrap svg { max-width: 100%; height: auto; }
  .warn-text { margin-top: 12px; background: var(--warn-light); color: var(--warn); border-radius: 6px; padding: 10px 12px; font-size: 12.5px; line-height: 1.5; }

  .notice { background: #F0F0EC; border-radius: 6px; padding: 12px; font-size: 13px; color: var(--muted); margin-bottom: 14px; }

  .primary-btn {
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; background: var(--primary);
    color: #fff; border: none; border-radius: 6px; padding: 11px 18px; cursor: pointer; width: 100%;
  }
  .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .summary-strip { display: flex; justify-content: space-between; gap: 10px; background: var(--primary-light); border-radius: 8px; padding: 14px; margin-bottom: 12px; }
  .summary-label { font-size: 11px; color: var(--muted); }
  .summary-value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; margin-top: 2px; }

  .log-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 10px; }
  .log-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: #fff; }
  .log-compact-meta { font-size: 13px; color: var(--ink); margin-bottom: 2px; }
  .log-compact-note { font-size: 12.5px; color: var(--muted); font-style: italic; margin-bottom: 6px; }
  .log-compact-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .quick-add-row { gap: 6px; margin-bottom: 6px; }
  .quick-add-input { flex: 1; min-width: 0; font-size: 13px; padding: 6px 8px; }
  .log-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .log-row-header { font-size: 13px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed var(--line); }
  .missing-name-flag { color: var(--warn); font-size: 12.5px; font-weight: 600; }
  .inline-name-fix { display: inline-block; width: auto; min-width: 160px; padding: 4px 8px; font-size: 12.5px; border-color: var(--warn); }
  .stack-sibling-line { font-size: 12px; color: var(--muted); font-style: italic; margin-bottom: 8px; }
  .dose-number-line { font-size: 12px; color: var(--primary); font-weight: 600; margin-bottom: 6px; }
  .view-vial-link { font-size: 11px; padding: 2px 6px; vertical-align: middle; }
  .log-row:last-child { margin-bottom: 0; }
  .log-row input[type="date"] { max-width: 150px; }
  .log-dose { font-size: 13px; flex: 1; font-family: 'IBM Plex Mono', monospace; }

  .text-btn { background: none; border: none; color: var(--primary); font-size: 12.5px; cursor: pointer; padding: 4px 6px; font-family: 'Inter', sans-serif; font-weight: 500; }
  .text-btn.subtle { color: var(--muted); }

  .contact-reminder { margin-top: 18px; border: 1px solid var(--warn); color: var(--warn); border-radius: 8px; padding: 12px 14px; font-size: 12.5px; line-height: 1.5; }

  .danger-zone { margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--line); }

  /* ---- start wizard ---- */
  .wizard-progress { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; margin-bottom: 16px; }
  .wizard-step { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); white-space: nowrap; }
  .wizard-step.active { color: var(--primary); font-weight: 600; }
  .wizard-step.done { color: var(--ink); }
  .wizard-sep { color: var(--line); font-size: 12px; }
  .wizard-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .label-prompt { background: var(--primary-light); border: 1px solid var(--primary); border-radius: 8px; padding: 14px; margin-top: 16px; }
  .label-prompt .wizard-actions { margin-top: 10px; }
  .wizard-actions .primary-btn { order: 1; }
  .wizard-actions .text-btn { order: 2; align-self: center; }

  .start-options { display: flex; flex-direction: column; gap: 10px; }
  .start-option-card {
    display: flex; align-items: center; gap: 14px; width: 100%;
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    padding: 14px 16px; cursor: pointer; text-align: left;
    font-family: 'Inter', sans-serif; transition: border-color 0.15s, background 0.15s;
  }
  .start-option-card:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-light); }
  .start-option-card:disabled { opacity: 0.45; cursor: not-allowed; }
  .start-option-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .start-option-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .start-option-title { font-weight: 600; font-size: 15px; color: var(--ink); }
  .start-option-sub { font-size: 12.5px; color: var(--muted); }
  .reorder-flag { background: var(--warn-light); color: var(--warn); font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .inventory-match-notice { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .reset-confirm { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 12.5px; color: var(--muted); }

  /* ---- inventory tab ---- */
  .section-h { font-family: 'Fraunces', serif; font-size: 15px; margin: 22px 0 10px; padding-top: 14px; border-top: 1px solid var(--line); }
  .subcard { background: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin: 12px 0 4px; }
  .subcard h3 { font-family: 'Fraunces', serif; font-size: 15px; margin: 0 0 12px; }
  .inv-summary { flex-wrap: wrap; }
  .secondary-btn { background: var(--ink); }

  .vial-group { border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; background: #fff; }

  /* ---- collapsible function sections (Log a purchase / Stack an injection) ---- */
  .collapsible-fn { border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; padding: 4px 12px; background: #fff; }
  .collapsible-fn-toggle {
    display: block; width: 100%; text-align: left; background: none; border: none;
    font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; color: var(--ink);
    padding: 10px 0; cursor: pointer;
  }
  .collapsible-fn .subcard { border: none; padding: 0; margin: 0 0 12px; }
  .collapsible-fn .recon-form { border-top: none; padding-top: 0; margin-top: 0; }

  /* ---- dose groups (vial header + list of dose lines) ---- */
  .dose-group { margin-bottom: 14px; }
  .dose-group-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 6px; padding-bottom: 6px; border-bottom: 1px solid var(--line); margin-bottom: 8px; }
  .dose-line-list { list-style: none; margin: 8px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .dose-line { display: flex; gap: 10px; align-items: flex-start; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; background: #fff; }
  .dose-line-syringe { flex-shrink: 0; width: 76px; }
  .dose-line-syringe svg { width: 76px; height: auto; }
  .dose-line-body { flex: 1; min-width: 0; }
  .dose-line-editing { display: block; padding: 10px; }
  .toggle-vial-doses-btn { margin-top: 4px; }
  .vial-group-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
  .recon-form { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }

  .vial-card { border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin-bottom: 12px; background: var(--primary-light); }
  .vial-card-expired { border-color: var(--warn); background: var(--warn-light); }
  .stack-row { border-bottom: 1px dashed var(--line); padding: 10px 0; }
  .stack-row:last-of-type { border-bottom: none; }
  .stack-check-label { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
  .stack-row .input-row { max-width: 320px; }
  .vial-card-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
  .vial-id { font-size: 12px; color: var(--muted); margin-right: 6px; }
  .vial-card-row { font-size: 12.5px; margin-bottom: 3px; }
  .vial-card-row.mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  .usage-row { margin: 8px 0; font-size: 12.5px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .usage-dot { font-size: 15px; color: var(--muted); }
  .usage-dot.done { color: var(--primary); }
  .vial-card-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }

  .history-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .history-table { width: 100%; min-width: 420px; border-collapse: collapse; font-size: 12.5px; margin-bottom: 8px; }
  .history-table th, .history-table td { border: 1px solid var(--line); padding: 6px 8px; text-align: left; }
  .history-table th { background: #fff; font-weight: 600; font-size: 11.5px; color: var(--muted); }

  .label-preview-frame { display: flex; justify-content: center; padding: 20px; background: #E4E9E6; border-radius: 8px; margin: 8px 0 16px; }
  .label-card { width: 260px; max-width: 100%; background: #fff; border: 1px solid var(--ink); border-radius: 3px; padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }
  .label-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 15px; color: var(--ink); }
  .label-row { font-size: 10.5px; color: var(--ink); line-height: 1.4; }
  .label-row.mono { font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
  .label-footer { margin-top: 4px; font-size: 8px; color: var(--muted); line-height: 1.3; font-style: italic; }

  #print-root { display: none; }
  @media print {
    @page { margin: 0.4in; }
    body * { visibility: hidden; }
    #print-root, #print-root * { visibility: visible; }
    #print-root { display: block; position: absolute; top: 0; left: 0; width: 100%; }
    .print-sheet { display: flex; flex-wrap: wrap; gap: 0.15in; }
    .print-label-cell { width: var(--label-w); height: var(--label-h); border: 1px dashed #999; padding: 0.1in 0.12in; overflow: hidden; box-sizing: border-box; display: flex; align-items: center; }
    .print-label-cell .label-card { width: 100%; border: none; padding: 0; gap: 2px; }
    .print-label-cell .label-name { font-size: 11pt; }
    .print-label-cell .label-row { font-size: 7.5pt; }
    .print-label-cell .label-row.mono { font-size: 7pt; }
    .print-label-cell .label-footer { font-size: 5.5pt; }

    /* 3 mL vial wrap (40x20mm) is much smaller than the other presets — tighten everything and drop the footer disclaimer, there's no room */
    .print-label-cell.label-tiny { padding: 0.03in 0.06in; }
    .print-label-cell.label-tiny .label-card { gap: 0; }
    .print-label-cell.label-tiny .label-name { font-size: 6.5pt; line-height: 1.15; }
    .print-label-cell.label-tiny .label-row { font-size: 5pt; line-height: 1.2; }
    .print-label-cell.label-tiny .label-row.mono { font-size: 4.8pt; }
    .print-label-cell.label-tiny .label-footer { display: none; }

    .report-page { font-family: 'Inter', sans-serif; color: #17262A; padding: 0; }
    .report-title { font-family: 'Fraunces', serif; font-size: 20pt; margin: 0 0 2pt; }
    .report-meta { font-size: 9pt; color: #5C6F6A; margin: 0 0 14pt; }
    .report-page h2 { font-family: 'Fraunces', serif; font-size: 13pt; margin: 16pt 0 6pt; }
    .report-summary-grid { display: flex; gap: 14pt; flex-wrap: wrap; margin-bottom: 8pt; }
    .report-summary-grid div { display: flex; flex-direction: column; font-size: 8pt; color: #5C6F6A; }
    .report-summary-grid strong { font-family: 'IBM Plex Mono', monospace; font-size: 12pt; color: #17262A; }
    .report-table { width: 100%; border-collapse: collapse; font-size: 8pt; margin-bottom: 6pt; }
    .report-table th, .report-table td { border: 1px solid #CBD6D1; padding: 4pt 6pt; text-align: left; }
    .report-table th { background: #EEF2EF; }
    .report-footer { font-size: 7.5pt; color: #5C6F6A; font-style: italic; margin-top: 14pt; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="print-root"></div>

<script>
(function () {
  "use strict";

  // ---------- constants ----------
  var STORAGE_KEY = "vialmath:data";

  var SYRINGES = [
    { id: "u30", label: "0.3 mL insulin (30-unit)", capML: 0.3, isUnit: true, minReadML: 0.01 },
    { id: "u50", label: "0.5 mL insulin (50-unit)", capML: 0.5, isUnit: true, minReadML: 0.01 },
    { id: "u100", label: "1 mL insulin (100-unit)", capML: 1.0, isUnit: true, minReadML: 0.01 },
    { id: "ml1", label: "1 mL standard (mL scale)", capML: 1.0, isUnit: false, minReadML: 0.01 },
    { id: "ml3", label: "3 mL standard (mL scale)", capML: 3.0, isUnit: false, minReadML: 0.1 }
  ];

  var LABEL_SIZES = {
    vial3ml: { name: "3 mL vial wrap — 1.5\" × 0.75\" (40 × 20 mm)", wIn: 1.5, hIn: 0.75 },
    small: { name: "Small — 2.5\" × 1.25\" (vial wrap)", wIn: 2.5, hIn: 1.25 },
    medium: { name: "Medium — 3\" × 2\" (jar/box)", wIn: 3, hIn: 2 },
    large: { name: "Large — 4\" × 3\" (info card)", wIn: 4, hIn: 3 }
  };

  var DEFAULT_STATE = {
    vial: { compoundName: "", totalAmount: "", totalUnit: "mg", diluentVolume: "" },
    dose: { amount: "", unit: "mcg", syringeId: "u100", linkedVialId: "" },
    meta: { reconstitutedDate: "", discardDate: "", prescriberNotes: "" },
    log: [],
    label: { size: "vial3ml", copies: 6 },
    inventory: { purchases: [], vials: [], counters: {} },
    saved: [],
    stacks: []
  };

  // ---------- helpers ----------
  function toMcg(amount, unit) { return unit === "mg" ? amount * 1000 : amount; }
  // Converts a dose entry (mcg / mg / syringe units) into { volumeML, doseMcg } given a concentration.
  // "units" = standard U-100 insulin-syringe units: 1 unit = 0.01 mL, independent of barrel size.
  function doseToVolume(amount, unit, concentrationMcgPerML) {
    if (unit === "units") {
      var volumeML = amount * 0.01;
      var doseMcg = concentrationMcgPerML > 0 ? volumeML * concentrationMcgPerML : 0;
      return { volumeML: volumeML, doseMcg: doseMcg };
    }
    var doseMcg2 = toMcg(amount, unit);
    var volumeML2 = concentrationMcgPerML > 0 ? doseMcg2 / concentrationMcgPerML : 0;
    return { volumeML: volumeML2, doseMcg: doseMcg2 };
  }
  function fmt(n, d) {
    d = d === undefined ? 3 : d;
    if (!isFinite(n)) return "—";
    var r = Math.round(n * Math.pow(10, d)) / Math.pow(10, d);
    return r.toString();
  }
  function todayISO() { return new Date().toISOString().slice(0, 10); }
  function addDaysToDateStr(dateStr, days) {
    var d = dateStr ? new Date(dateStr + "T00:00:00") : new Date();
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }
  function weekNumberSince(startDateStr, targetDateStr) {
    if (!startDateStr || !targetDateStr) return null;
    var start = new Date(startDateStr + "T00:00:00");
    var target = new Date(targetDateStr + "T00:00:00");
    var diffDays = Math.round((target - start) / (1000 * 60 * 60 * 24));
    if (diffDays < 0 || isNaN(diffDays)) return null;
    return Math.floor(diffDays / 7) + 1;
  }
  function uid() { return Math.random().toString(36).slice(2, 10); }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function getPath(obj, path) {
    return path.split(".").reduce(function (o, k) { return o == null ? o : o[k]; }, obj);
  }
  function setPath(obj, path, value) {
    var parts = path.split(".");
    var cur = obj;
    for (var i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
    cur[parts[parts.length - 1]] = value;
  }

  // ---------- inventory helpers ----------
  function slugify(name) {
    return String(name || "PEPTIDE").toUpperCase().replace(/[^A-Z0-9]/g, "") || "PEPTIDE";
  }
  function nextVialId(inv, peptideName) {
    var slug = slugify(peptideName);
    var n = (inv.counters[slug] || 0) + 1;
    inv.counters[slug] = n;
    return slug + "-" + String(n).padStart(3, "0");
  }
  var CIRCLED_DIGITS = "①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳";
  function circledNumber(n) {
    if (n >= 1 && n <= 20) return CIRCLED_DIGITS[n - 1];
    return "(" + n + ")";
  }
  function usageDotsHTML(plannedDoses, doneCount) {
    var out = "";
    var total = Math.max(plannedDoses || 0, doneCount || 0);
    for (var i = 1; i <= total; i++) {
      if (i <= doneCount) out += '<span class="usage-dot done">' + circledNumber(i) + '</span>';
      else out += '<span class="usage-dot">' + circledNumber(i) + '</span>';
    }
    return out;
  }
  function vialConcentration(vial) {
    var totalMcg = toMcg(vial.strengthMg, "mg");
    var diluentML = parseFloat(vial.diluentML) || 0;
    return diluentML > 0 ? totalMcg / diluentML : 0;
  }
  function isVialExpired(v) {
    return v.status === "active" && !!v.expiryDate && v.expiryDate < todayISO();
  }
  function inventorySummary(inv) {
    var totalPurchasedMg = inv.purchases.reduce(function (s, p) { return s + (p.totalMg || 0); }, 0);
    var unopened = inv.vials.filter(function (v) { return v.status === "unopened"; });
    var active = inv.vials.filter(function (v) { return v.status === "active"; });
    var finished = inv.vials.filter(function (v) { return v.status === "finished"; });
    var finishedMg = finished.reduce(function (s, v) { return s + (v.strengthMg || 0); }, 0);
    var remainingMg = Math.max(0, totalPurchasedMg - finishedMg);
    var rawMg = unopened.reduce(function (s, v) { return s + (v.strengthMg || 0); }, 0);
    var reconstitutedMg = active.reduce(function (s, v) { return s + (v.strengthMg || 0); }, 0);

    // group unopened vials by purchase batch (not just peptide name) so distinct lots/suppliers/
    // sizes of the same peptide show up as separate, selectable options rather than being merged
    var groups = {};
    unopened.forEach(function (v) {
      var key = v.purchaseId || v.peptideName; // fall back gracefully if a vial somehow lacks a purchaseId
      if (!groups[key]) {
        var purchase = inv.purchases.filter(function (p) { return p.id === v.purchaseId; })[0];
        groups[key] = {
          purchaseId: v.purchaseId || null,
          peptideName: v.peptideName, strengthMg: v.strengthMg, vialSizeML: v.vialSizeML,
          supplier: purchase ? purchase.supplier : "", lotNumber: purchase ? purchase.lotNumber : "",
          date: purchase ? purchase.date : "",
          labelPrinted: purchase ? !!purchase.labelPrinted : false,
          labelPrintedDate: purchase ? purchase.labelPrintedDate : "",
          count: 0, vialIds: []
        };
      }
      groups[key].count++;
      groups[key].vialIds.push(v.id);
    });

    // per-peptide breakdown: raw vs reconstituted mg, last reconstituted date, low-stock flag
    var LOW_STOCK_THRESHOLD = 1;
    var peptideNames = {};
    inv.vials.forEach(function (v) { peptideNames[v.peptideName] = true; });
    var byPeptide = Object.keys(peptideNames).map(function (name) {
      var vs = inv.vials.filter(function (v) { return v.peptideName === name; });
      var unopenedVs = vs.filter(function (v) { return v.status === "unopened"; });
      var activeVs = vs.filter(function (v) { return v.status === "active"; });
      var finishedVs = vs.filter(function (v) { return v.status === "finished"; });
      var lastReconDate = vs.reduce(function (latest, v) {
        return (v.reconstitutedDate && (!latest || v.reconstitutedDate > latest)) ? v.reconstitutedDate : latest;
      }, null);
      return {
        peptideName: name,
        unopenedCount: unopenedVs.length,
        activeCount: activeVs.length,
        finishedCount: finishedVs.length,
        rawMg: unopenedVs.reduce(function (s, v) { return s + (v.strengthMg || 0); }, 0),
        reconstitutedMg: activeVs.reduce(function (s, v) { return s + (v.strengthMg || 0); }, 0),
        lastReconstitutedDate: lastReconDate,
        lowStock: unopenedVs.length <= LOW_STOCK_THRESHOLD
      };
    }).sort(function (a, b) { return a.peptideName.localeCompare(b.peptideName); });

    return {
      totalPurchasedMg: totalPurchasedMg,
      unopenedCount: unopened.length,
      activeCount: active.length,
      finishedCount: finished.length,
      remainingMg: remainingMg,
      rawMg: rawMg,
      reconstitutedMg: reconstitutedMg,
      unopenedGroups: Object.keys(groups).map(function (k) { return groups[k]; }),
      activeVials: active,
      finishedVials: finished,
      byPeptide: byPeptide
    };
  }

  // ---------- inventory match: suggest existing unopened stock while entering a vial elsewhere ----------
  function findInventoryMatch(name) {
    var n = (name || "").trim().toLowerCase();
    if (!n) return null;
    var groups = inventorySummary(state.inventory).unopenedGroups;
    return groups.filter(function (g) { return g.peptideName.trim().toLowerCase() === n; })[0] || null;
  }
  function inventoryMatchHTML(name) {
    var m = findInventoryMatch(name);
    if (!m) return "";
    return '<div class="notice inventory-match-notice">You have ' + m.count + ' unopened ' + esc(m.peptideName) +
      ' vial' + (m.count === 1 ? "" : "s") + ' at ' + fmt(m.strengthMg, 2) + ' mg each in Inventory. ' +
      '<button type="button" class="text-btn" id="use-inventory-match-btn">Use this</button></div>';
  }
  // finds a currently-active inventory vial with a matching peptide name, so a dose logged
  // from the quick calculator can be tied to a real vial ID instead of floating free
  function findActiveVialMatch(name) {
    var n = (name || "").trim().toLowerCase();
    if (!n) return null;
    return state.inventory.vials.filter(function (v) { return v.status === "active" && v.peptideName.trim().toLowerCase() === n; })[0] || null;
  }

  // Logs the current Vial&Mix/Dose entry. Uses whatever vial the user explicitly chose in the
  // "Link to vial" dropdown (state.dose.linkedVialId). If nothing was chosen (or the chosen vial
  // is no longer active), it logs as a standalone ad-hoc entry instead, tagged with whatever
  // peptide name was typed so it's still identifiable.
  function logCurrentDose(d) {
    var linkedVial = null;
    if (state.dose.linkedVialId) {
      linkedVial = state.inventory.vials.filter(function (v) { return v.id === state.dose.linkedVialId && v.status === "active"; })[0] || null;
    }
    if (linkedVial) {
      linkedVial.injections = linkedVial.injections || [];
      linkedVial.injections.push({
        id: uid(),
        date: todayISO(),
        doseAmount: state.dose.amount,
        doseUnit: state.dose.unit,
        site: "",
        note: ""
      });
    } else {
      state.log.unshift({
        id: uid(),
        date: todayISO(),
        doseMcg: d.doseMcg,
        doseLabel: state.dose.amount + " " + state.dose.unit,
        volumeML: d.drawVolumeML,
        site: "",
        note: "",
        peptideName: state.vial.compoundName || ""
      });
    }
    saveStateDebounced();
  }

  // ---------- state ----------
  var state = loadState();
  var currentTab = "start";
  var wizardStep = 1; // UI-only, not persisted: 1=start options, 2=which vial, 3=add a dose, 4=done
  var dosingVialId = null; // which vial the Add-a-dose flow is currently logging against (UI-only, not persisted)
  var wizardFlow = null; // "reconstitute" | "dose" | null \u2014 which guided flow steps 2-4 belong to (UI-only, not persisted)
  var saveTimer = null;
  var reconstitutingPeptide = null; // which unopened-vial group has its reconstitute form open (UI-only, not persisted)
  var reconstitutingPurchaseId = null; // which specific purchase batch of that peptide was chosen (UI-only, not persisted)
  var editingVialId = null; // which active vial's edit form is open (UI-only, not persisted)
  var addingAdhocDose = false; // whether the Tracker's manual "ad-hoc dose" form is open (UI-only, not persisted)
  var editingLogEntryKey = null; // which tracker row (source:refId) is expanded for full editing (UI-only, not persisted)
  var quickAddTarget = null; // { entryKey, field } — which single field's inline "+" input is open (UI-only, not persisted)
  var expandedVialDosesId = null; // which vial's dose history is expanded on the Inventory page (UI-only, not persisted)
  var purchaseFormOpen = false; // Inventory: is the "Log a purchase" section expanded (UI-only, not persisted)
  var stackSectionOpen = false; // Inventory: is the "Stack an injection" section expanded (UI-only, not persisted)
  var logDoseFormOpen = false; // Inventory: is the "Log a dose" section expanded (UI-only, not persisted)
  var reconstituteFormOpen = false; // Inventory: is the "Reconstitute" section expanded (UI-only, not persisted)
  var labelSelection = "adhoc"; // Print label tab: "adhoc" | "vial:<id>" | "batch:<purchaseId>" (UI-only, not persisted)

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return JSON.parse(JSON.stringify(DEFAULT_STATE));
      var parsed = JSON.parse(raw);
      return {
        vial: Object.assign({}, DEFAULT_STATE.vial, parsed.vial),
        dose: Object.assign({}, DEFAULT_STATE.dose, parsed.dose),
        meta: Object.assign({}, DEFAULT_STATE.meta, parsed.meta),
        log: Array.isArray(parsed.log) ? parsed.log : [],
        label: Object.assign({}, DEFAULT_STATE.label, parsed.label),
        inventory: {
          purchases: (parsed.inventory && Array.isArray(parsed.inventory.purchases)) ? parsed.inventory.purchases : [],
          vials: (parsed.inventory && Array.isArray(parsed.inventory.vials)) ? parsed.inventory.vials : [],
          counters: (parsed.inventory && parsed.inventory.counters) ? parsed.inventory.counters : {}
        },
        saved: Array.isArray(parsed.saved) ? parsed.saved : [],
        stacks: Array.isArray(parsed.stacks) ? parsed.stacks : []
      };
    } catch (e) {
      return JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  }

  function saveStateDebounced() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        flashSaved();
      } catch (e) {
        console.error("Could not save:", e);
      }
    }, 300);
  }

  function saveNow() {
    clearTimeout(saveTimer);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      flashSaved();
      return true;
    } catch (e) {
      console.error("Could not save:", e);
      return false;
    }
  }

  function flashSaved() {
    var el = document.getElementById("save-indicator");
    if (!el) return;
    el.classList.add("flash");
    el.textContent = "Saved";
    setTimeout(function () { el.classList.remove("flash"); }, 900);
  }

  // ---------- derived math ----------
  function derive() {
    var vialTotalMcg = toMcg(parseFloat(state.vial.totalAmount) || 0, state.vial.totalUnit);
    var diluentML = parseFloat(state.vial.diluentVolume) || 0;
    var concentrationMcgPerML = diluentML > 0 ? vialTotalMcg / diluentML : 0;
    var hasVial = vialTotalMcg > 0 && diluentML > 0;

    var doseAmount = parseFloat(state.dose.amount) || 0;
    var syringe = SYRINGES.filter(function (s) { return s.id === state.dose.syringeId; })[0] || SYRINGES[2];
    var conv = doseToVolume(doseAmount, state.dose.unit, concentrationMcgPerML);
    var drawVolumeML = conv.volumeML;
    var doseMcg = conv.doseMcg;
    var drawUnits = drawVolumeML * 100;
    var overCapacity = drawVolumeML > syringe.capML;
    var belowResolution = drawVolumeML > 0 && drawVolumeML < syringe.minReadML;
    var fillFraction = syringe.capML > 0 ? drawVolumeML / syringe.capML : 0;
    var hasDose = doseAmount > 0 && (state.dose.unit === "units" || concentrationMcgPerML > 0);

    var totalLoggedMcg = state.log.reduce(function (sum, e) { return sum + (e.doseMcg || 0); }, 0);
    var remainingMcg = Math.max(0, vialTotalMcg - totalLoggedMcg);

    return {
      vialTotalMcg: vialTotalMcg, concentrationMcgPerML: concentrationMcgPerML, hasVial: hasVial,
      doseMcg: doseMcg, drawVolumeML: drawVolumeML, syringe: syringe, drawUnits: drawUnits,
      overCapacity: overCapacity, belowResolution: belowResolution, fillFraction: fillFraction,
      hasDose: hasDose, remainingMcg: remainingMcg
    };
  }

  // ---------- syringe SVG ----------
  function syringeSVG(fillFraction, overCapacity) {
    var clamped = Math.max(0, Math.min(1, fillFraction || 0));
    var barrelW = 220;
    var fillW = barrelW * clamped;
    var fillColor = overCapacity ? "var(--warn)" : "var(--primary)";
    var ticks = "";
    for (var i = 0; i <= 10; i++) {
      var x = 24 + (barrelW / 10) * i;
      ticks += '<line x1="' + x + '" y1="26" x2="' + x + '" y2="' + (i % 5 === 0 ? 40 : 34) + '" stroke="var(--ink)" stroke-width="1" />';
    }
    return '' +
      '<svg width="260" height="86" viewBox="0 0 260 86" role="img" aria-label="syringe fill">' +
      '<rect x="2" y="30" width="14" height="26" rx="2" fill="var(--ink)" />' +
      '<rect x="14" y="36" width="10" height="14" fill="var(--ink)" />' +
      '<rect x="24" y="26" width="' + barrelW + '" height="34" rx="3" fill="var(--paper)" stroke="var(--ink)" stroke-width="2" />' +
      '<rect x="24" y="26" width="' + fillW + '" height="34" rx="3" fill="' + fillColor + '" opacity="0.85" />' +
      ticks +
      '<rect x="' + (24 + barrelW) + '" y="40" width="22" height="6" fill="var(--muted)" />' +
      '<polygon points="' + (24 + barrelW + 22) + ',40 ' + (24 + barrelW + 34) + ',43 ' + (24 + barrelW + 22) + ',46" fill="var(--muted)" />' +
      '</svg>';
  }

  // ---------- label markup ----------
  function labelCardHTML(d) {
    var v = state.vial, m = state.meta, ds = state.dose;
    var doseAmountNum = parseFloat(ds.amount) || 0;
    var conv = doseToVolume(doseAmountNum, ds.unit, d.concentrationMcgPerML);
    var doseVolumeML = conv.volumeML;
    var doseMcgVal = conv.doseMcg;
    var concLine = d.hasVial
      ? fmt(d.concentrationMcgPerML / 1000, 4) + " mg/mL (" + fmt(d.concentrationMcgPerML, 1) + " mcg/mL)"
      : "concentration —";
    var doseLine = doseAmountNum > 0
      ? '<div class="label-row mono">Dose: ' + esc(ds.amount) + ' ' + esc(ds.unit) + ' = ' + fmt(doseVolumeML, 3) + ' mL' +
        (ds.unit === "units" ? ' (' + fmt(doseMcgVal, 1) + ' mcg)' : '') + '</div>'
      : "";
    return '' +
      '<div class="label-card">' +
      '<div class="label-name">' + esc(v.compoundName || "Unnamed vial") + '</div>' +
      '<div class="label-row mono">' + concLine + '</div>' +
      '<div class="label-row">' + esc(v.totalAmount || "—") + ' ' + esc(v.totalUnit) + ' in ' + esc(v.diluentVolume || "—") + ' mL</div>' +
      '<div class="label-row">Mixed: ' + esc(m.reconstitutedDate || "—") + ' · Discard: ' + esc(m.discardDate || "—") + '</div>' +
      doseLine +
      '<div class="label-footer">Per prescriber instructions — do not change dose without consulting them.</div>' +
      '</div>';
  }

  // ---------- tab renderers ----------
  // ---------- start wizard (guided flow: welcome -> vial & dose -> preview label -> print & log) ----------
  function renderStartTab(d) {
    // guard against stale/invalid state (e.g. reload mid-flow)
    if (wizardFlow === "dose") {
      if (wizardStep === 2 && inventorySummary(state.inventory).activeVials.length === 0) wizardStep = 1;
      if ((wizardStep === 3 || wizardStep === 4) && !state.inventory.vials.some(function (v) { return v.id === dosingVialId; })) wizardStep = 1;
    }
    if (wizardFlow === "reconstitute") {
      var stillAvailable = inventorySummary(state.inventory).unopenedGroups.some(function (g) { return !findActiveVialMatch(g.peptideName); });
      if (wizardStep >= 2 && wizardStep <= 3 && !stillAvailable) wizardStep = 1;
    }
    if (wizardStep === 1) { wizardFlow = null; return renderWizardStep1(); }

    if (wizardFlow === "reconstitute") {
      if (wizardStep === 2) return renderWizardReconPicker();
      if (wizardStep === 3) return renderWizardReconForm();
      if (wizardStep === 4) return renderWizardReconDone();
    }
    if (wizardFlow === "dose") {
      if (wizardStep === 2) return renderWizardVialPicker();
      if (wizardStep === 3) return renderWizardAddDose();
      if (wizardStep === 4) return renderWizardDoseDone();
    }
    if (wizardFlow === "purchase") {
      if (wizardStep === 2) return renderWizardPurchaseForm();
      if (wizardStep === 3) return renderWizardPurchaseDone();
    }
    return renderWizardStep1();
  }

  function wizardProgressHTML(step) {
    var labels = wizardFlow === "reconstitute" ? ["Start", "Which batch", "Reconstitute", "Done"]
      : wizardFlow === "purchase" ? ["Start", "Purchase", "Done"]
      : ["Start", "Which vial", "Add a dose", "Done"];
    return '<div class="wizard-progress">' + labels.map(function (l, i) {
      var n = i + 1;
      var cls = n === step ? "active" : (n < step ? "done" : "");
      return '<span class="wizard-step ' + cls + '">' + n + '. ' + esc(l) + '</span>';
    }).join('<span class="wizard-sep">\u203a</span>') + '</div>';
  }

  function startOptionButton(id, icon, title, sub, disabled) {
    return '<button type="button" class="start-option-card" id="' + id + '"' + (disabled ? " disabled" : "") + '>' +
      '<span class="start-option-icon" aria-hidden="true">' + icon + '</span>' +
      '<span class="start-option-text"><span class="start-option-title">' + esc(title) + '</span>' +
      '<span class="start-option-sub">' + esc(sub) + '</span></span>' +
      '</button>';
  }

  function renderWizardStep1() {
    var inv = inventorySummary(state.inventory);
    var hasUnopened = inv.unopenedGroups.some(function (g) { return !findActiveVialMatch(g.peptideName); });
    var hasActive = inv.activeVials.length > 0;
    return '' +
      '<section class="card">' +
      wizardProgressHTML(1) +
      '<h2>What would you like to do?</h2>' +
      '<div class="start-options">' +
      startOptionButton("start-reconstitute-btn", "\uD83E\uDDEA", "Reconstitute a vial",
        hasUnopened ? "Turn an unopened vial into an active one" : "No unopened vials ready \u2014 log a purchase first") +
      startOptionButton("start-add-dose-btn", "\uD83D\uDC89", "Add a dose",
        hasActive ? "Log a dose against a vial that's already active" : "No active vials yet \u2014 reconstitute one first", !hasActive) +
      startOptionButton("start-purchase-btn", "\uD83D\uDCE6", "Log a purchase", "Record a new order into inventory") +
      startOptionButton("start-view-inventory-btn", "\uD83D\uDCCB", "View inventory", "See what's on hand and what's active") +
      '</div>' +
      '</section>';
  }

  function renderWizardReconPicker() {
    var groups = inventorySummary(state.inventory).unopenedGroups.filter(function (g) { return !findActiveVialMatch(g.peptideName); });
    var optionsHTML = groups.map(function (g, i) {
      var subBits = [g.count + ' unopened', fmt(g.strengthMg, 2) + ' mg each'];
      if (g.vialSizeML) subBits.push(g.vialSizeML + ' mL vial');
      if (g.supplier) subBits.push(g.supplier);
      if (g.lotNumber) subBits.push('lot ' + g.lotNumber);
      var label = g.peptideName + ' \u2014 ' + subBits.join(', ');
      return '<option value="' + i + '">' + esc(label) + '</option>';
    }).join("");
    return '' +
      '<section class="card">' +
      wizardProgressHTML(2) +
      '<h2>Which batch?</h2>' +
      '<p class="card-desc">' + (groups.length > 1 ? "Select which batch to open." : "Confirm the batch to open.") + '</p>' +
      field("Batch", null, '<select id="recon-batch-select">' + optionsHTML + '</select>') +
      '<div class="wizard-actions">' +
      '<button class="text-btn subtle" id="wizard-back-to-start-btn">Back</button>' +
      '<button class="primary-btn" id="recon-picker-continue-btn">Continue</button>' +
      '</div>' +
      '</section>';
  }

  function renderWizardReconForm() {
    var groups = inventorySummary(state.inventory).unopenedGroups;
    var g = groups.filter(function (grp) {
      return grp.peptideName === reconstitutingPeptide && (reconstitutingPurchaseId ? grp.purchaseId === reconstitutingPurchaseId : true);
    })[0];
    if (!g) return renderWizardStep1();
    var subBits = [g.count + ' unopened', fmt(g.strengthMg, 2) + ' mg each'];
    if (g.vialSizeML) subBits.push(esc(g.vialSizeML) + ' mL vial');
    if (g.supplier) subBits.push(esc(g.supplier));
    if (g.lotNumber) subBits.push('lot ' + esc(g.lotNumber));
    return '' +
      '<section class="card">' +
      wizardProgressHTML(3) +
      '<h2>Reconstitute ' + esc(g.peptideName) + '</h2>' +
      '<p class="card-desc">' + subBits.join(' \u00b7 ') + '. This opens the next vial from this batch and makes it active.</p>' +
      reconstituteFormHTML(g) +
      '<div class="wizard-actions"><button class="text-btn subtle" id="wizard-back-to-recon-picker-btn">Back</button></div>' +
      '</section>';
  }

  function renderWizardReconDone() {
    var vial = state.inventory.vials.filter(function (v) { return v.id === dosingVialId; })[0];
    return '' +
      '<section class="card">' +
      wizardProgressHTML(4) +
      '<h2>Done</h2>' +
      '<p class="card-desc">' + (vial ? esc(vial.peptideName) + ' <span class="mono vial-id">' + esc(vial.id) + '</span>' : "The vial") + ' is now active and ready to dose.</p>' +
      '<div class="label-prompt" id="recon-label-prompt">' +
      '<p class="card-desc small">Print a label for this vial now?</p>' +
      '<div class="wizard-actions">' +
      '<button class="primary-btn" id="wizard-print-vial-label-btn">Yes, print label</button>' +
      '<button class="text-btn subtle" id="wizard-skip-vial-label-btn">Not now</button>' +
      '</div>' +
      '</div>' +
      '<div class="wizard-actions">' +
      '<button class="text-btn subtle" id="wizard-goto-inventory-btn">View in Inventory</button>' +
      '<button class="primary-btn" id="wizard-add-dose-now-btn">Add a dose now</button>' +
      '</div>' +
      '</section>';
  }

  function renderWizardPurchaseForm() {
    return '' +
      '<section class="card">' +
      wizardProgressHTML(2) +
      '<h2>Log a purchase</h2>' +
      '<p class="card-desc">Record what you ordered. This adds that many unopened vials to inventory, each with its own ID.</p>' +
      purchaseFormHTML(true) +
      '<div class="wizard-actions"><button class="text-btn subtle" id="wizard-back-to-start-btn">Back</button></div>' +
      '</section>';
  }

  function renderWizardPurchaseDone() {
    var purchases = state.inventory.purchases;
    var last = purchases[purchases.length - 1];
    return '' +
      '<section class="card">' +
      wizardProgressHTML(3) +
      '<h2>Purchase logged</h2>' +
      '<p class="card-desc">' +
      (last ? esc(last.vialsPurchased) + ' \u00d7 ' + esc(last.peptideName) + ' vial' + (last.vialsPurchased === 1 ? "" : "s") + ' added to inventory, unopened.' : "Added to inventory.") +
      '</p>' +
      (last ? '' +
        '<div class="label-prompt" id="purchase-label-prompt">' +
        '<p class="card-desc small">Print labels for this batch now (' + last.vialsPurchased + ', one per vial) so each one can be matched back to its vendor and lot in storage?</p>' +
        '<div class="wizard-actions">' +
        '<button class="primary-btn" id="wizard-print-batch-label-btn">Yes, print labels</button>' +
        '<button class="text-btn subtle" id="wizard-skip-batch-label-btn">Not now</button>' +
        '</div>' +
        '</div>'
        : "") +
      '<div class="wizard-actions">' +
      '<button class="text-btn subtle" id="wizard-goto-inventory-btn">View in Inventory</button>' +
      '<button class="primary-btn" id="wizard-log-another-purchase-btn">Log another purchase</button>' +
      '</div>' +
      '</section>';
  }

  function renderWizardVialPicker() {
    var actives = inventorySummary(state.inventory).activeVials;
    var optionsHTML = actives.map(function (v, i) {
      var conc = vialConcentration(v);
      var label = v.peptideName + ' (' + v.id + ') \u2014 ' + fmt(conc / 1000, 4) + ' mg/mL' + (isVialExpired(v) ? ' \u2014 expired' : '');
      return '<option value="' + i + '">' + esc(label) + '</option>';
    }).join("");
    return '' +
      '<section class="card">' +
      wizardProgressHTML(2) +
      '<h2>Which vial?</h2>' +
      '<p class="card-desc">' + (actives.length > 1 ? "Select which active vial to dose from." : "Confirm the vial to dose from.") + '</p>' +
      field("Vial", null, '<select id="dose-vial-select">' + optionsHTML + '</select>') +
      '<div class="wizard-actions">' +
      '<button class="text-btn subtle" id="wizard-back-to-start-btn">Back</button>' +
      '<button class="primary-btn" id="vial-picker-continue-btn">Continue</button>' +
      '</div>' +
      '</section>';
  }

  function renderWizardAddDose() {
    var vial = state.inventory.vials.filter(function (v) { return v.id === dosingVialId; })[0];
    var conc = vialConcentration(vial);
    var amount = parseFloat(state.dose.amount) || 0;
    var conv = doseToVolume(amount, state.dose.unit, conc);
    var hasAmount = amount > 0;
    return '' +
      '<section class="card">' +
      wizardProgressHTML(3) +
      '<h2>Add a dose</h2>' +
      '<div class="vial-card">' +
      '<div class="vial-card-head"><span class="mono vial-id">' + esc(vial.id) + '</span> <strong>' + esc(vial.peptideName) + '</strong>' +
      (isVialExpired(vial) ? ' <span class="reorder-flag expired-flag">Expired</span>' : '') + '</div>' +
      '<div class="vial-card-row mono">Concentration: ' + fmt(conc / 1000, 4) + ' mg/mL</div>' +
      '</div>' +
      '<div class="grid-2">' +
      field("Dose amount", null,
        '<div class="input-row"><input type="number" min="0" inputmode="decimal" data-path="dose.amount" value="' + esc(state.dose.amount) + '" placeholder="e.g. 250" />' +
        '<select data-path="dose.unit">' + opt("mcg", state.dose.unit) + opt("mg", state.dose.unit) + opt("units", state.dose.unit, "units (syringe)") + '</select></div>') +
      '<div></div>' +
      '</div>' +
      '<div class="result-panel ' + (hasAmount ? "" : "muted") + '" id="wizard-dose-result-panel">' + renderWizardDoseResult(conv, hasAmount) + '</div>' +
      '<div class="wizard-actions">' +
      '<button class="text-btn subtle" id="wizard-back-to-picker-btn">Back</button>' +
      '<button class="primary-btn" id="wizard-add-dose-confirm-btn" ' + (hasAmount ? "" : "disabled") + '>Print label &amp; log dose</button>' +
      '</div>' +
      '</section>';
  }

  function reconstituteSectionHTML(unopenedGroups) {
    var available = unopenedGroups.filter(function (g) { return !findActiveVialMatch(g.peptideName); });
    if (available.length === 0) {
      return '<div class="notice">Nothing available to reconstitute \u2014 log a purchase above, or complete an active vial to free up its peptide.</div>';
    }
    var currentValid = available.some(function (g) { return g.peptideName === reconstitutingPeptide && (g.purchaseId || "") === (reconstitutingPurchaseId || ""); });
    if (!currentValid) {
      reconstitutingPeptide = available[0].peptideName;
      reconstitutingPurchaseId = available[0].purchaseId || null;
    }
    var options = available.map(function (g) {
      var subBits = [g.count + ' unopened', fmt(g.strengthMg, 2) + ' mg each'];
      if (g.vialSizeML) subBits.push(g.vialSizeML + ' mL vial');
      if (g.supplier) subBits.push(g.supplier);
      if (g.lotNumber) subBits.push('lot ' + g.lotNumber);
      var val = g.peptideName + "::" + (g.purchaseId || "");
      var isSelected = g.peptideName === reconstitutingPeptide && (g.purchaseId || "") === (reconstitutingPurchaseId || "");
      return '<option value="' + esc(val) + '"' + (isSelected ? " selected" : "") + '>' + esc(g.peptideName + " \u2014 " + subBits.join(", ")) + '</option>';
    }).join("");
    var chosen = available.filter(function (g) { return g.peptideName === reconstitutingPeptide && (g.purchaseId || "") === (reconstitutingPurchaseId || ""); })[0] || available[0];

    return '' +
      field("Which batch?", null, '<select id="inv-recon-batch-select">' + options + '</select>') +
      reconstituteFormHTML(chosen);
  }

  function logDoseFormHTML(activeVials) {
    var ds = state.dose;
    if (activeVials.length === 0) {
      return '<div class="notice">No active vials yet. Reconstitute one first.</div>';
    }
    var linkOptions = activeVials.map(function (v) { return opt(v.id, ds.linkedVialId, v.peptideName + ' (' + v.id + ')'); }).join("");
    var vial = state.inventory.vials.filter(function (v) { return v.id === ds.linkedVialId && v.status === "active"; })[0];
    var conc = vial ? vialConcentration(vial) : 0;
    var amount = parseFloat(ds.amount) || 0;
    var conv = doseToVolume(amount, ds.unit, conc);
    var hasAmount = amount > 0 && !!vial;
    return '' +
      field("Vial", null, '<select data-path="dose.linkedVialId">' + linkOptions + '</select>') +
      '<div class="grid-2">' +
      field("Dose amount", null,
        '<div class="input-row"><input type="number" min="0" inputmode="decimal" data-path="dose.amount" value="' + esc(ds.amount) + '" placeholder="e.g. 250" />' +
        '<select data-path="dose.unit">' + opt("mcg", ds.unit) + opt("mg", ds.unit) + opt("units", ds.unit, "units (syringe)") + '</select></div>') +
      '<div></div>' +
      '</div>' +
      '<div class="result-panel ' + (hasAmount ? "" : "muted") + '" id="inv-dose-result-panel">' +
      (hasAmount ? renderWizardDoseResult(conv, true) : '<div class="result-label">Draw to</div><div class="result-value">\u2014</div>') +
      '</div>' +
      '<button class="primary-btn" id="confirm-inv-dose-btn" ' + (hasAmount ? "" : "disabled") + '>Log this dose</button>';
  }

  function renderWizardDoseResult(conv, hasAmount) {
    if (!hasAmount) return '<div class="result-label">Draw to</div><div class="result-value">—</div>';
    return '<div class="result-label">Draw to</div><div class="result-value mono">' + fmt(conv.volumeML, 3) + ' mL<span class="result-sub">(' + fmt(conv.volumeML * 100, 1) + ' units)</span></div>';
  }

  function renderWizardDoseDone() {
    var vial = state.inventory.vials.filter(function (v) { return v.id === dosingVialId; })[0];
    return '' +
      '<section class="card">' +
      wizardProgressHTML(4) +
      '<h2>Done</h2>' +
      '<p class="card-desc">Label sent to print, and this dose is logged against ' +
      (vial ? esc(vial.peptideName) + ' <span class="mono vial-id">' + esc(vial.id) + '</span>' : "the vial") + '.</p>' +
      '<div class="wizard-actions">' +
      '<button class="text-btn subtle" id="wizard-view-tracker-btn">View tracker</button>' +
      '<button class="primary-btn" id="wizard-add-another-dose-btn">Add another dose</button>' +
      '</div>' +
      '</section>';
  }

  function renderVialTab(d) {
    var v = state.vial, m = state.meta;
    return '' +
      '<section class="card">' +
      '<h2>Vial setup</h2>' +
      '<p class="card-desc">Enter what\'s printed on the vial and how much diluent you\'re adding, exactly as your pharmacist instructed.</p>' +
      field("Compound / vial name", 'as written on the vial or pharmacy label',
        '<input type="text" data-path="vial.compoundName" value="' + esc(v.compoundName) + '" placeholder="e.g. Semaglutide" />') +
      '<div id="vial-inventory-match">' + inventoryMatchHTML(v.compoundName) + '</div>' +
      '<div class="grid-2">' +
      field("Total amount in vial", null,
        '<div class="input-row">' +
        '<input type="number" min="0" inputmode="decimal" data-path="vial.totalAmount" value="' + esc(v.totalAmount) + '" placeholder="e.g. 5" />' +
        '<select data-path="vial.totalUnit">' + opt("mg", v.totalUnit) + opt("mcg", v.totalUnit) + '</select>' +
        '</div>') +
      field("Diluent (bacteriostatic water) added", "Total liquid volume now in the vial",
        '<div class="input-row">' +
        '<input type="number" min="0" inputmode="decimal" data-path="vial.diluentVolume" value="' + esc(v.diluentVolume) + '" placeholder="e.g. 2" />' +
        '<span class="unit-suffix">mL</span>' +
        '</div>') +
      '</div>' +
      '<div class="grid-2">' +
      field("Date reconstituted", null, '<input type="date" data-path="meta.reconstitutedDate" value="' + esc(m.reconstitutedDate) + '" />') +
      field("Discard date", "From your pharmacist's label — not calculated by this app", '<input type="date" data-path="meta.discardDate" value="' + esc(m.discardDate) + '" />') +
      '</div>' +
      field("Prescriber / pharmacy instructions", "Paste or type the instructions as given to you",
        '<textarea rows="3" data-path="meta.prescriberNotes" placeholder="e.g. Inject 250 mcg subcutaneously twice weekly, per Dr. ___">' + esc(m.prescriberNotes) + '</textarea>') +
      '<div class="result-panel ' + (d.hasVial ? "" : "muted") + '" id="vial-result-panel">' +
      renderConcentrationResult(d) +
      '</div>' +
      '</section>';
  }

  function renderConcentrationResult(d) {
    return '' +
      '<div class="result-label">Concentration</div>' +
      '<div class="result-value">' +
      (d.hasVial ? fmt(d.concentrationMcgPerML / 1000, 4) + " mg/mL" : "—") +
      (d.hasVial ? '<span class="result-sub">(' + fmt(d.concentrationMcgPerML, 1) + ' mcg/mL)</span>' : "") +
      '</div>';
  }

  function renderDoseTab(d) {
    var ds = state.dose;
    // if nothing has been explicitly chosen yet, default to an active vial matching the typed
    // compound name (still fully overridable via the dropdown below \u2014 this is just a starting point)
    if (!ds.linkedVialId) {
      var suggested = findActiveVialMatch(state.vial.compoundName);
      if (suggested) ds.linkedVialId = suggested.id;
    }
    var activeVials = inventorySummary(state.inventory).activeVials;
    var linkOptions = '<option value="">Not linked \u2014 ad-hoc entry</option>' +
      activeVials.map(function (v) { return opt(v.id, ds.linkedVialId, v.peptideName + ' (' + v.id + ')'); }).join("");
    return '' +
      '<section class="card">' +
      '<h2>Prescribed dose</h2>' +
      '<p class="card-desc">Enter the exact dose your prescriber gave you. This calculates how much liquid that dose corresponds to — it does not choose or suggest a dose.</p>' +
      (!d.hasVial ? '<div class="notice">Set up your vial concentration on the "Vial &amp; mix" tab first.</div>' : "") +
      field("Select vial", activeVials.length === 0 ? "No active vials \u2014 this will log as ad-hoc" : "Which inventory vial this dose comes from, or leave ad-hoc",
        '<select data-path="dose.linkedVialId">' + linkOptions + '</select>') +
      '<div class="grid-2">' +
      field("Prescribed dose amount", null,
        '<div class="input-row">' +
        '<input type="number" min="0" inputmode="decimal" data-path="dose.amount" value="' + esc(ds.amount) + '" placeholder="e.g. 250" />' +
        '<select data-path="dose.unit">' + opt("mcg", ds.unit) + opt("mg", ds.unit) + opt("units", ds.unit, "units (syringe)") + '</select>' +
        '</div>') +
      field("Syringe on hand", null,
        '<select data-path="dose.syringeId">' + SYRINGES.map(function (s) { return opt(s.id, ds.syringeId, s.label); }).join("") + '</select>') +
      '</div>' +
      '<div class="result-panel ' + (d.hasVial && d.hasDose ? "" : "muted") + '" id="dose-result-panel">' +
      renderDoseResult(d) +
      '</div>' +
      '<button class="primary-btn" id="log-btn" ' + (d.hasDose ? "" : "disabled") + '>Log this as an injection</button>' +
      '<button class="text-btn subtle" id="save-calc-btn" style="margin-top:10px" ' + (d.hasVial && d.hasDose ? "" : "disabled") + '>Save this calculation</button>' +
      '</section>';
  }

  function renderDoseResult(d) {
    var html;
    if (d.syringe.isUnit) {
      html = '<div class="result-label">Draw to</div>' +
        '<div class="result-value">' +
        (d.hasVial && d.hasDose ? fmt(d.drawUnits, 1) + " units" : "—") +
        (d.hasVial && d.hasDose
          ? '<span class="result-sub">(' + fmt(d.drawVolumeML, 3) + ' mL' +
            (state.dose.unit === "units" ? ' · ' + fmt(d.doseMcg, 1) + ' mcg equivalent' : '') + ')</span>'
          : "") +
        '</div>';
    } else {
      html = '<div class="result-label">Draw to</div>' +
        '<div class="result-value">' +
        (d.hasVial && d.hasDose ? fmt(d.drawVolumeML, 3) + " mL" : "—") +
        (d.hasVial && d.hasDose && state.dose.unit === "units" ? '<span class="result-sub">(' + fmt(d.doseMcg, 1) + ' mcg equivalent)</span>' : "") +
        '</div>' +
        '<div class="field-hint" style="margin-top:4px">This syringe isn\'t marked in units — switch to an insulin-style syringe above to read this dose in units.</div>';
    }
    if (d.hasVial && d.hasDose) {
      html += '<div class="syringe-wrap">' + syringeSVG(d.fillFraction, d.overCapacity) + '</div>';
    }
    if (d.overCapacity) {
      html += '<div class="warn-text">This volume is larger than your selected syringe\'s capacity (' + d.syringe.capML + ' mL). Double-check your entries, or ask your pharmacist about a larger syringe.</div>';
    } else if (d.belowResolution) {
      html += '<div class="warn-text">This volume is very small and hard to measure precisely on this syringe. Consider using more diluent when reconstituting, or a finer syringe — check with your pharmacist first.</div>';
    }
    return html;
  }

  // merges standalone tracker entries with every inventory vial's injection history,
  // newest first, so the Tracker tab shows one list with peptide name + vial ID together
  function getAllTrackerEntries() {
    var entries = [];
    state.log.forEach(function (e) {
      entries.push({
        source: "log", refId: e.id, vialRefId: null,
        date: e.date, peptideName: e.peptideName || "", vialId: null,
        doseLabel: e.doseLabel || "", volumeML: e.volumeML, site: e.site || "", note: e.note || ""
      });
    });
    state.inventory.vials.forEach(function (v) {
      (v.injections || []).forEach(function (inj, idx) {
        var doseLabel = inj.doseAmount ? (inj.doseAmount + " " + (inj.doseUnit || "mcg")) : "";
        var stackPeptides = [];
        if (inj.stackId) {
          var stack = state.stacks.filter(function (s) { return s.id === inj.stackId; })[0];
          if (stack) {
            stackPeptides = stack.components
              .filter(function (c) { return c.vialId !== v.id; })
              .map(function (c) { return c.peptideName + " (" + fmt(c.volumeML, 3) + " mL)"; });
          }
        }
        entries.push({
          source: "vial", refId: inj.id, vialRefId: v.id,
          date: inj.date, peptideName: v.peptideName, vialId: v.id,
          doseLabel: doseLabel, volumeML: null, site: inj.site || "", note: inj.note || "",
          stackPeptides: stackPeptides,
          doseNumber: idx + 1, plannedDoses: v.plannedDoses || null
        });
      });
    });
    entries.sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); });
    return entries;
  }

  // ---------- shared: one dose line within a vial's history (used by Dose Tracker and Inventory's "Show doses") ----------
  function doseLineHTML(vial, inj, idx, conc) {
    var entryKey = "vial:" + inj.id;
    var isEditing = editingLogEntryKey === entryKey;
    var conv = doseToVolume(parseFloat(inj.doseAmount) || 0, inj.doseUnit || "mcg", conc);
    var refSyringe = SYRINGES.filter(function (s) { return s.id === "u100"; })[0] || SYRINGES[2];
    var fillFraction = refSyringe.capML > 0 ? conv.volumeML / refSyringe.capML : 0;
    var week = weekNumberSince(vial.reconstitutedDate, inj.date);
    var doseText = inj.doseAmount ? (esc(inj.doseAmount) + " " + esc(inj.doseUnit || "mcg")) : '<span class="field-hint">No dose recorded</span>';
    var idAttrs = 'data-source="vial" data-ref-id="' + esc(inj.id) + '" data-vial-ref-id="' + esc(vial.id) + '"';

    if (!isEditing) {
      var showSiteInput = quickAddTarget && quickAddTarget.entryKey === entryKey && quickAddTarget.field === "site";
      var showNoteInput = quickAddTarget && quickAddTarget.entryKey === entryKey && quickAddTarget.field === "note";
      var metaBits = ["Dose " + (idx + 1), esc(inj.date), doseText];
      if (week) metaBits.push("Week " + week);
      if (inj.site && !showSiteInput) metaBits.push(esc(inj.site));
      var siteInputRow = showSiteInput
        ? '<div class="log-row quick-add-row"><input type="text" class="quick-add-input" data-entry-key="' + entryKey + '" data-field="site" placeholder="Injection site" value="' + esc(inj.site) + '" autofocus /><button type="button" class="text-btn save-quickadd-btn" data-entry-key="' + entryKey + '" data-field="site">Save</button></div>'
        : "";
      var noteInputRow = showNoteInput
        ? '<div class="log-row quick-add-row"><input type="text" class="quick-add-input" data-entry-key="' + entryKey + '" data-field="note" placeholder="Note" value="' + esc(inj.note) + '" autofocus /><button type="button" class="text-btn save-quickadd-btn" data-entry-key="' + entryKey + '" data-field="note">Save</button></div>'
        : "";
      var noteDisplay = (inj.note && !showNoteInput) ? '<div class="log-compact-note">' + esc(inj.note) + '</div>' : "";
      var siteAddBtn = (!inj.site && !showSiteInput) ? '<button type="button" class="text-btn subtle quick-add-btn" data-entry-key="' + entryKey + '" data-field="site">+ Location</button>' : "";
      var noteAddBtn = (!inj.note && !showNoteInput) ? '<button type="button" class="text-btn subtle quick-add-btn" data-entry-key="' + entryKey + '" data-field="note">+ Note</button>' : "";

      return '' +
        '<li class="dose-line" ' + idAttrs + '>' +
        '<div class="dose-line-syringe">' + syringeSVG(fillFraction, fillFraction > 1) + '</div>' +
        '<div class="dose-line-body">' +
        '<div class="log-compact-meta">' + metaBits.join(' \u00b7 ') + '</div>' +
        siteInputRow + noteDisplay + noteInputRow +
        '<div class="log-compact-actions">' + siteAddBtn + noteAddBtn +
        '<button type="button" class="text-btn subtle edit-log-entry-btn" data-entry-key="' + entryKey + '">Edit</button>' +
        '</div>' +
        '</div>' +
        '</li>';
    }

    return '' +
      '<li class="dose-line dose-line-editing" ' + idAttrs + '>' +
      '<div class="log-row">' +
      '<input type="date" data-log-field="date" value="' + esc(inj.date) + '" />' +
      '<span class="log-dose">' + doseText + '</span>' +
      '<button class="text-btn remove-log-btn">Remove</button>' +
      '</div>' +
      '<div class="log-row"><input type="text" data-log-field="site" placeholder="Injection site (optional)" value="' + esc(inj.site) + '" /></div>' +
      '<div class="log-row"><input type="text" data-log-field="note" placeholder="Side-effect notes (optional)" value="' + esc(inj.note) + '" /></div>' +
      '<button type="button" class="text-btn subtle done-editing-log-btn" data-entry-key="' + entryKey + '">Done</button>' +
      '</li>';
  }

  // header + dose list for one vial. collapsible=true hides the list behind a "Show doses" toggle (used on Inventory).
  function vialDoseGroupHTML(vial, collapsible) {
    var conc = vialConcentration(vial);
    var injections = vial.injections || [];
    var rows = injections.map(function (inj, idx) { return doseLineHTML(vial, inj, idx, conc); }).join("");
    var doseListHTML = '<ul class="dose-line-list">' + (rows || '<li class="field-hint">No doses logged yet</li>') + '</ul>';
    var headerHTML = '' +
      '<div class="dose-group-header">' +
      '<div><strong>' + esc(vial.peptideName) + '</strong> <span class="mono vial-id">' + esc(vial.id) + '</span></div>' +
      '<div class="field-hint">Mixed ' + esc(vial.reconstitutedDate || "\u2014") + ' \u00b7 ' + injections.length + (vial.plannedDoses ? ' of ' + vial.plannedDoses : '') + ' doses</div>' +
      '</div>';
    if (collapsible) {
      var expanded = expandedVialDosesId === vial.id;
      return headerHTML +
        '<button type="button" class="text-btn toggle-vial-doses-btn" data-vial-id="' + esc(vial.id) + '">' +
        (expanded ? "\u25be Hide doses" : "\u25b8 Show doses (" + injections.length + ")") + '</button>' +
        (expanded ? doseListHTML : "");
    }
    return headerHTML + doseListHTML;
  }

  function renderLogTab(d) {
    // group by vial (any vial with at least one logged dose — active or finished, so history isn't lost on completion)
    var vialsWithDoses = state.inventory.vials.filter(function (v) { return (v.injections || []).length > 0; });
    vialsWithDoses.sort(function (a, b) { return (b.reconstitutedDate || "").localeCompare(a.reconstitutedDate || ""); });
    var vialGroupsHTML = vialsWithDoses.map(function (v) {
      return '<div class="dose-group">' + vialDoseGroupHTML(v, false) + '</div>';
    }).join("");

    // ad-hoc entries not tied to any vial, shown separately underneath
    var adhocEntries = state.log.slice().sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); });
    var adhocItems = adhocEntries.map(function (e) {
      var entryKey = "log:" + e.id;
      var isEditing = editingLogEntryKey === entryKey;
      var idAttrs = 'data-source="log" data-ref-id="' + esc(e.id) + '"';
      var headerLine = e.peptideName
        ? '<strong>' + esc(e.peptideName) + '</strong> <span class="field-hint">(not linked to inventory)</span>'
        : '<span class="missing-name-flag">No peptide name \u2014 </span><input type="text" data-log-field="peptideName" class="inline-name-fix" placeholder="Add peptide name" value="" />';
      var doseVolText = (function () {
        var parts = [];
        if (e.doseLabel) parts.push(esc(e.doseLabel));
        if (e.volumeML != null) parts.push(fmt(e.volumeML, 3) + ' mL');
        return parts.length ? parts.join(' \u00b7 ') : '<span class="field-hint">No dose recorded</span>';
      })();

      if (!isEditing) {
        var showSiteInput = quickAddTarget && quickAddTarget.entryKey === entryKey && quickAddTarget.field === "site";
        var showNoteInput = quickAddTarget && quickAddTarget.entryKey === entryKey && quickAddTarget.field === "note";
        var metaBits = [esc(e.date), doseVolText];
        if (e.site && !showSiteInput) metaBits.push(esc(e.site));
        var siteInputRow = showSiteInput
          ? '<div class="log-row quick-add-row"><input type="text" class="quick-add-input" data-entry-key="' + entryKey + '" data-field="site" placeholder="Injection site" value="' + esc(e.site) + '" autofocus /><button type="button" class="text-btn save-quickadd-btn" data-entry-key="' + entryKey + '" data-field="site">Save</button></div>'
          : "";
        var noteInputRow = showNoteInput
          ? '<div class="log-row quick-add-row"><input type="text" class="quick-add-input" data-entry-key="' + entryKey + '" data-field="note" placeholder="Note" value="' + esc(e.note) + '" autofocus /><button type="button" class="text-btn save-quickadd-btn" data-entry-key="' + entryKey + '" data-field="note">Save</button></div>'
          : "";
        var noteDisplay = (e.note && !showNoteInput) ? '<div class="log-compact-note">' + esc(e.note) + '</div>' : "";
        var siteAddBtn = (!e.site && !showSiteInput) ? '<button type="button" class="text-btn subtle quick-add-btn" data-entry-key="' + entryKey + '" data-field="site">+ Location</button>' : "";
        var noteAddBtn = (!e.note && !showNoteInput) ? '<button type="button" class="text-btn subtle quick-add-btn" data-entry-key="' + entryKey + '" data-field="note">+ Note</button>' : "";
        return '' +
          '<li class="log-item" ' + idAttrs + '>' +
          '<div class="log-row log-row-header">' + headerLine + '</div>' +
          '<div class="log-compact-meta">' + metaBits.join(' \u00b7 ') + '</div>' +
          siteInputRow + noteDisplay + noteInputRow +
          '<div class="log-compact-actions">' + siteAddBtn + noteAddBtn +
          '<button type="button" class="text-btn subtle edit-log-entry-btn" data-entry-key="' + entryKey + '">Edit</button>' +
          '</div>' +
          '</li>';
      }
      return '' +
        '<li class="log-item log-item-editing" ' + idAttrs + '>' +
        '<div class="log-row log-row-header">' + headerLine + '</div>' +
        '<div class="log-row">' +
        '<input type="date" data-log-field="date" value="' + esc(e.date) + '" />' +
        '<span class="log-dose">' + doseVolText + '</span>' +
        '<button class="text-btn remove-log-btn">Remove</button>' +
        '</div>' +
        '<div class="log-row"><input type="text" data-log-field="site" placeholder="Injection site (optional)" value="' + esc(e.site) + '" /></div>' +
        '<div class="log-row"><input type="text" data-log-field="note" placeholder="Side-effect notes (optional)" value="' + esc(e.note) + '" /></div>' +
        '<button type="button" class="text-btn subtle done-editing-log-btn" data-entry-key="' + entryKey + '">Done</button>' +
        '</li>';
    }).join("");

    var totalDoses = getAllTrackerEntries().length;
    return '' +
      '<section class="card">' +
      '<h2>Dose Tracker</h2>' +
      '<p class="card-desc small">' + totalDoses + ' dose' + (totalDoses === 1 ? "" : "s") + ' logged, grouped by vial \u2014 newest vial first, oldest dose first within each.</p>' +
      (vialsWithDoses.length === 0
        ? '<div class="notice">No doses logged against a vial yet. Log one from the "Dose" tab, or from an active vial in Inventory.</div>'
        : vialGroupsHTML) +
      (adhocEntries.length > 0
        ? '<h3 class="section-h">Not linked to inventory</h3><ul class="log-list">' + adhocItems + '</ul>'
        : "") +
      '<button class="text-btn" id="toggle-adhoc-dose-btn" style="margin-top:10px">' + (addingAdhocDose ? "Cancel" : "+ Add a dose that didn't come from inventory") + '</button>' +
      (addingAdhocDose ? adhocDoseFormHTML() : "") +
      '<button class="text-btn" id="manual-save-tracker-btn" style="margin-top:10px">Save tracker data</button>' +
      '<div class="contact-reminder">Notice a new or worsening side effect, a missed dose, or anything that doesn\'t match your instructions? Contact your prescriber or pharmacist before your next injection.</div>' +
      '<div class="danger-zone" id="danger-zone">' + renderDangerZone(false) + '</div>' +
      '</section>';
  }

  function adhocDoseFormHTML() {
    return '' +
      '<div class="recon-form">' +
      '<p class="card-desc small">For a dose you\'re recording after the fact \u2014 not calculated here and not tied to a specific inventory vial.</p>' +
      field("Peptide / compound name", "optional", '<input type="text" id="adhoc-peptideName" placeholder="e.g. BPC-157" />') +
      '<div class="grid-2">' +
      field("Date", null, '<input type="date" id="adhoc-date" value="' + todayISO() + '" />') +
      field("Volume (mL)", "optional", '<input type="number" min="0" step="any" id="adhoc-volumeML" placeholder="e.g. 0.05" />') +
      '</div>' +
      '<div class="grid-2">' +
      field("Dose amount", "optional", '<div class="input-row"><input type="number" min="0" step="any" id="adhoc-amount" placeholder="e.g. 250" />' +
        '<select id="adhoc-unit">' + opt("mcg", "mcg") + opt("mg", "mg") + '</select></div>') +
      field("Injection site", "optional", '<input type="text" id="adhoc-site" placeholder="e.g. left thigh" />') +
      '</div>' +
      field("Notes", "optional", '<input type="text" id="adhoc-note" placeholder="optional" />') +
      '<button class="primary-btn" id="confirm-adhoc-dose-btn">Add to tracker</button>' +
      '</div>';
  }

  function renderSummaryStrip(d) {
    return '' +
      '<div><div class="summary-label">Theoretical remaining</div><div class="summary-value">' + (d.hasVial ? fmt(d.remainingMcg / 1000, 3) + " mg" : "—") + '</div></div>' +
      '<div><div class="summary-label">Doses logged</div><div class="summary-value">' + getAllTrackerEntries().length + '</div></div>' +
      '<div><div class="summary-label">Discard date</div><div class="summary-value">' + esc(state.meta.discardDate || "not set") + '</div></div>';
  }

  function renderDangerZone(confirmMode) {
    if (!confirmMode) {
      return '<button class="text-btn subtle" id="show-reset-btn">Clear all saved data</button>';
    }
    return '' +
      '<div class="reset-confirm">' +
      '<span>Delete all vial, dose, and log data from this device?</span>' +
      '<button class="text-btn" id="confirm-reset-btn">Yes, delete</button>' +
      '<button class="text-btn subtle" id="cancel-reset-btn">Cancel</button>' +
      '</div>';
  }

  function renderLabelTab(d) {
    var l = state.label;
    var invSummary = inventorySummary(state.inventory);
    var options = ['<option value="adhoc"' + (labelSelection === "adhoc" ? " selected" : "") + '>Ad-hoc calculation (Vial &amp; Mix tab)</option>'];
    invSummary.activeVials.forEach(function (v) {
      var val = "vial:" + v.id;
      options.push('<option value="' + val + '"' + (labelSelection === val ? " selected" : "") + '>' + esc(v.peptideName) + ' (' + esc(v.id) + ') \u2014 active</option>');
    });
    invSummary.unopenedGroups.forEach(function (g) {
      if (!g.purchaseId) return;
      var val = "batch:" + g.purchaseId;
      var label = esc(g.peptideName) + ' \u2014 unopened batch' + (g.supplier ? ' (' + esc(g.supplier) + ')' : '');
      options.push('<option value="' + val + '"' + (labelSelection === val ? " selected" : "") + '>' + label + '</option>');
    });

    var previewHTML, canPrint;
    if (labelSelection === "adhoc") {
      previewHTML = labelCardHTML(d);
      canPrint = d.hasVial;
    } else if (labelSelection.indexOf("vial:") === 0) {
      var vial = state.inventory.vials.filter(function (v) { return v.id === labelSelection.slice(5); })[0];
      previewHTML = vial ? vialLabelCardHTML(vial) : '<div class="notice">That vial isn\'t available anymore.</div>';
      canPrint = !!vial;
    } else {
      var purchase = state.inventory.purchases.filter(function (p) { return p.id === labelSelection.slice(6); })[0];
      previewHTML = purchase ? batchLabelCardHTML(purchase) : '<div class="notice">That batch isn\'t available anymore.</div>';
      canPrint = !!purchase;
    }

    return '' +
      '<section class="card">' +
      '<h2>Print label</h2>' +
      '<p class="card-desc">Prints on regular sticker/adhesive paper from any printer. Pick what to print, a size, then cut along the dashed lines.</p>' +
      field("What to print", null, '<select id="label-selection-select">' + options.join("") + '</select>') +
      '<div class="grid-2">' +
      field("Label size", null,
        '<select data-path="label.size">' + Object.keys(LABEL_SIZES).map(function (id) { return opt(id, l.size, LABEL_SIZES[id].name); }).join("") + '</select>') +
      field("Copies on sheet", "Repeats the same label so you can cut several",
        '<select data-path="label.copies" data-numeric="1">' + [1, 2, 4, 6, 8, 12].map(function (n) { return opt(String(n), String(l.copies), String(n)); }).join("") + '</select>') +
      '</div>' +
      '<div class="label-preview-frame" id="label-preview">' + previewHTML + '</div>' +
      '<button class="primary-btn" id="print-btn" ' + (canPrint ? "" : "disabled") + '>Print label sheet</button>' +
      '</section>';
  }

  // ---------- inventory tab ----------
  function renderInventoryTab() {
    var inv = state.inventory;
    var s = inventorySummary(inv);

    var purchaseSection = '' +
      '<div class="collapsible-fn">' +
      '<button type="button" class="collapsible-fn-toggle" id="toggle-purchase-form-btn">' +
      (purchaseFormOpen ? "\u25be" : "\u25b8") + ' Log a purchase' +
      '</button>' +
      (purchaseFormOpen ? purchaseFormHTML(true) : "") +
      '</div>';

    var stackSection = '' +
      '<div class="collapsible-fn">' +
      '<button type="button" class="collapsible-fn-toggle" id="toggle-stack-form-btn">' +
      (stackSectionOpen ? "\u25be" : "\u25b8") + ' Stack an injection' +
      '</button>' +
      (stackSectionOpen
        ? '<p class="card-desc small">Combine two or more reconstituted vials into a single syringe draw. Each vial is reconstituted separately as usual \u2014 this just logs a combined injection and counts a dose against every vial included.</p>' + renderStackBuilderHTML(s.activeVials)
        : "") +
      '</div>';

    var reconstituteSection = '' +
      '<div class="collapsible-fn">' +
      '<button type="button" class="collapsible-fn-toggle" id="toggle-reconstitute-form-btn">' +
      (reconstituteFormOpen ? "\u25be" : "\u25b8") + ' Reconstitute' +
      '</button>' +
      (reconstituteFormOpen ? reconstituteSectionHTML(s.unopenedGroups) : "") +
      '</div>';

    var logDoseSection = '' +
      '<div class="collapsible-fn">' +
      '<button type="button" class="collapsible-fn-toggle" id="toggle-log-dose-form-btn">' +
      (logDoseFormOpen ? "\u25be" : "\u25b8") + ' Log a dose' +
      '</button>' +
      (logDoseFormOpen ? logDoseFormHTML(s.activeVials) : "") +
      '</div>';

    var unopenedHTML = s.unopenedGroups.length === 0 ? "" : s.unopenedGroups.map(function (g) {
      var existingActive = findActiveVialMatch(g.peptideName);
      var blocked = !!existingActive;
      var lowStock = g.count <= 1;
      return '' +
        '<div class="vial-group">' +
        '<div class="vial-group-head">' +
        '<div><strong>' + esc(g.peptideName) + '</strong> <span class="field-hint">' + g.count + ' unopened \u00b7 ' + fmt(g.strengthMg, 2) + ' mg each' + (g.vialSizeML ? ' \u00b7 ' + esc(g.vialSizeML) + ' mL vial' : '') + '</span>' +
        (lowStock ? ' <span class="reorder-flag">Reorder soon</span>' : '') + '</div>' +
        (blocked
          ? '<span class="field-hint">Active: <span class="mono vial-id">' + esc(existingActive.id) + '</span>' + (isVialExpired(existingActive) ? ' <span class="reorder-flag expired-flag">Expired</span>' : '') + '</span>'
          : '<button type="button" class="text-btn goto-reconstitute-link" data-peptide="' + esc(g.peptideName) + '" data-purchase-id="' + esc(g.purchaseId || "") + '">Ready to reconstitute \u2192</button>') +
        '</div>' +
        (g.purchaseId ? '<div class="field-hint">' + (g.labelPrinted ? "Label printed " + esc(g.labelPrintedDate) : "Label not printed yet") + ' \u00b7 <button class="text-btn print-batch-label-btn" data-purchase-id="' + esc(g.purchaseId) + '">' + (g.labelPrinted ? "Reprint" : "Print") + ' batch label</button></div>' : "") +
        '</div>';
    }).join("");

    var activeHTML = s.activeVials.length === 0
      ? '<div class="notice">No active vials. Go to Start \u2192 Reconstitute a vial to open one.</div>'
      : s.activeVials.map(function (v) { return activeVialCardHTML(v); }).join("");

    var stackHistoryHTML = renderStackHistoryHTML();

    var finishedHTML = s.finishedVials.length === 0
      ? '<div class="notice">No finished vials yet.</div>'
